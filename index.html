<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动化静力水准安装教学 - 1基准点+2测点</title>
<style>
  /* ========== Reset & Base ========== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a45;
    --bg-hover: #253355;
    --accent-cyan: #00d4aa;
    --accent-blue: #0ea5e9;
    --accent-orange: #f59e0b;
    --accent-red: #ef4444;
    --accent-green: #22c55e;
    --text-primary: #e8eaf0;
    --text-secondary: #94a3b8;
    --text-dim: #64748b;
    --border: #2d3a56;
    --glow-cyan: 0 0 20px rgba(0, 212, 170, 0.3);
    --glow-blue: 0 0 20px rgba(14, 165, 233, 0.3);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .screen.active { display: flex; }

  /* ========== Start Screen ========== */
  #startScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0f1b3d 100%);
  }

  .start-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  .start-content { position: relative; z-index: 1; text-align: center; max-width: 900px; width: 95%; }

  .start-icon {
    width: 120px; height: 120px; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    border-radius: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    box-shadow: 0 10px 40px rgba(0,212,170,0.2);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .start-title {
    font-size: 38px; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .start-subtitle { font-size: 16px; color: var(--text-secondary); margin-bottom: 16px; font-weight: 300; }

  /* Start screen system diagram canvas */
  #startDiagramCanvas {
    display: block; margin: 0 auto 16px; width: 100%; max-width: 680px; height: auto;
    border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg-primary);
  }

  .start-steps {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    max-width: 800px; margin: 0 auto 20px; padding: 0 10px;
  }
  .start-step-item {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 4px; font-size: 10px; color: var(--text-secondary);
    text-align: center; transition: all 0.3s;
  }
  .start-step-item:hover {
    border-color: var(--accent-cyan); color: var(--accent-cyan);
    box-shadow: var(--glow-cyan);
  }
  .start-step-num {
    display: inline-block; width: 20px; height: 20px; line-height: 20px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    color: var(--bg-primary); border-radius: 50%; font-size: 10px; font-weight: 700;
    margin-bottom: 3px;
  }

  .btn-start {
    padding: 14px 50px; font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    color: var(--bg-primary); border: none; border-radius: 14px;
    cursor: pointer; transition: all 0.3s; letter-spacing: 2px;
  }
  .btn-start:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(0,212,170,0.4);
  }

  /* ========== Game Screen ========== */
  #gameScreen {
    flex-direction: column;
    background: var(--bg-primary);
  }

  /* Top Bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 10;
  }
  .top-bar-left { display: flex; align-items: center; gap: 16px; }
  .top-bar-title { font-size: 15px; font-weight: 700; color: var(--accent-cyan); white-space: nowrap; }
  .top-bar-center { display: flex; align-items: center; gap: 18px; }
  .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; }
  .stat-icon { font-size: 16px; }
  .stat-value { font-weight: 700; color: var(--accent-cyan); }
  .stat-label { color: var(--text-dim); font-size: 11px; }
  .top-bar-right { display: flex; align-items: center; gap: 10px; }

  .progress-bar-container {
    width: 220px; height: 7px; background: var(--bg-card);
    border-radius: 4px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
    border-radius: 4px; transition: width 0.5s ease;
  }
  .progress-text { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .btn-hint {
    padding: 5px 12px; font-size: 11px;
    background: transparent; color: var(--accent-orange);
    border: 1px solid var(--accent-orange); border-radius: 6px;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-hint:hover { background: rgba(245,158,11,0.1); }
  .btn-hint:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Game Body */
  .game-body {
    display: flex; flex: 1; overflow: hidden;
  }

  /* Toolbar */
  .toolbar {
    width: 150px; background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    padding: 12px 10px; display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto; flex-shrink: 0;
  }
  .toolbar-title {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    text-align: center;
  }
  .tool-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 8px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: grab; transition: all 0.3s; font-size: 12px;
  }
  .tool-item:hover {
    border-color: var(--accent-cyan); background: var(--bg-hover);
    box-shadow: var(--glow-cyan);
  }
  .tool-item:active { cursor: grabbing; }
  .tool-item.used {
    opacity: 0.3; pointer-events: none; cursor: default;
    border-color: transparent;
  }
  .tool-item.correct-flash {
    border-color: var(--accent-green); background: rgba(34,197,94,0.1);
    box-shadow: 0 0 15px rgba(34,197,94,0.3);
  }
  .tool-item.wrong-flash {
    border-color: var(--accent-red); background: rgba(239,68,68,0.1);
    animation: shake 0.5s;
  }
  .tool-emoji { font-size: 20px; flex-shrink: 0; }
  .tool-name { font-size: 11px; color: var(--text-secondary); line-height: 1.3; }

  /* Canvas Area */
  .canvas-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #gameCanvas {
    display: block;
    border-radius: 8px;
  }

  /* Step Info Panel */
  .step-info {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(30,42,69,0.95); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 22px;
    text-align: center; max-width: 480px; width: 90%;
    backdrop-filter: blur(10px);
  }
  .step-info-title {
    font-size: 14px; font-weight: 700; color: var(--accent-cyan); margin-bottom: 3px;
  }
  .step-info-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

  /* Hint Panel */
  .hint-panel {
    position: absolute; top: 14px; right: 14px;
    background: rgba(30,42,69,0.95); border: 1px solid var(--accent-orange);
    border-radius: 10px; padding: 12px 16px; max-width: 260px;
    font-size: 11px; color: var(--accent-orange); line-height: 1.5;
    display: none; backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(245,158,11,0.15);
  }
  .hint-panel.show { display: block; animation: fadeIn 0.3s; }
  .hint-panel-title { font-weight: 700; margin-bottom: 3px; font-size: 12px; }

  /* Feedback Overlay */
  .feedback-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 16px 32px; border-radius: 14px; font-size: 18px; font-weight: 700;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    backdrop-filter: blur(10px);
  }
  .feedback-overlay.correct {
    background: rgba(34,197,94,0.15); border: 2px solid var(--accent-green);
    color: var(--accent-green); box-shadow: 0 0 30px rgba(34,197,94,0.2);
  }
  .feedback-overlay.wrong {
    background: rgba(239,68,68,0.15); border: 2px solid var(--accent-red);
    color: var(--accent-red); box-shadow: 0 0 30px rgba(239,68,68,0.2);
  }
  .feedback-overlay.show { opacity: 1; }

  /* Right Panel - Step List */
  .right-panel {
    width: 200px; background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    padding: 14px; overflow-y: auto; flex-shrink: 0;
  }
  .right-panel-title {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    text-align: center;
  }
  .step-list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px; margin-bottom: 3px;
    font-size: 11px; color: var(--text-dim); transition: all 0.3s;
  }
  .step-list-item.active {
    background: rgba(0,212,170,0.1); color: var(--accent-cyan); font-weight: 700;
  }
  .step-list-item.completed { color: var(--accent-green); }
  .step-list-item.completed .step-list-num { background: var(--accent-green); color: #fff; }
  .step-list-num {
    width: 20px; height: 20px; line-height: 20px; text-align: center;
    background: var(--bg-card); border-radius: 50%; font-size: 9px; font-weight: 700;
    flex-shrink: 0;
  }
  .step-list-item.active .step-list-num {
    background: var(--accent-cyan); color: var(--bg-primary);
  }

  /* ========== End Screen ========== */
  #endScreen {
    flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
  }
  .end-content { text-align: center; position: relative; z-index: 1; }
  .end-icon { font-size: 72px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  .end-title { font-size: 32px; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .end-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

  .end-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 32px;
  }
  .end-stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 16px; text-align: center;
  }
  .end-stat-value {
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .end-stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .end-grade {
    font-size: 64px; font-weight: 900; margin-bottom: 6px;
  }
  .end-grade-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }

  .end-stars { font-size: 32px; margin-bottom: 24px; letter-spacing: 6px; }

  .btn-restart {
    padding: 12px 44px; font-size: 16px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    color: var(--bg-primary); border: none; border-radius: 12px;
    cursor: pointer; transition: all 0.3s; letter-spacing: 2px;
  }
  .btn-restart:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(0,212,170,0.4);
  }

  /* ========== Animations ========== */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
  }

  /* Drag ghost */
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 1000;
    padding: 6px 14px; background: rgba(30,42,69,0.95);
    border: 2px solid var(--accent-cyan); border-radius: 8px;
    font-size: 13px; color: var(--accent-cyan); font-weight: 700;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    transform: translate(-50%, -50%);
  }

  /* ====== 评分弹窗（可最小化） ====== */
  .end-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 520px; max-width: 95vw;
    background: linear-gradient(135deg, rgba(26,26,46,0.97), rgba(22,33,62,0.97));
    border: 1px solid var(--border); border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,212,170,0.1);
    z-index: 1000; display: none; overflow: hidden;
    backdrop-filter: blur(16px);
  }
  .end-popup.show { display: block; animation: popupIn .4s ease; }
  @keyframes popupIn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.9); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .end-popup-titlebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px; background: rgba(0,212,170,0.08);
    border-bottom: 1px solid var(--border); cursor: move; user-select: none;
  }
  .end-popup-title { font-size: 14px; font-weight: 700; color: var(--accent-cyan); }
  .end-popup-btns { display: flex; gap: 6px; }
  .end-popup-btn {
    width: 28px; height: 28px; background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-secondary); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .end-popup-btn:hover { background: rgba(0,212,170,0.15); color: var(--accent-cyan); }
  .end-popup-body { padding: 28px 24px 24px; text-align: center; }

  .end-minimized-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px;
    background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(22,33,62,0.95));
    border: 1px solid var(--accent-cyan); border-radius: 10px;
    color: var(--accent-cyan); font-size: 13px; font-weight: 600;
    cursor: pointer; z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: fadeIn .3s ease;
  }
  .end-minimized-bar:hover { background: rgba(0,212,170,0.15); }

  /* gameScreen 在弹窗出现时保持可见 */
  #gameScreen.behind-popup { display: flex !important; pointer-events: auto; }

  /* end-content 兼容（如果还有引用） */
  .end-content { text-align: center; }

</style>
</head>
<body>

<!-- ==================== START SCREEN ==================== -->
<div id="startScreen" class="screen active">
  <div class="start-bg-grid"></div>
  <div class="start-content">
    <div class="start-icon">🏗️</div>
    <div class="start-title">自动化静力水准系统</div>
    <div class="start-subtitle">1基准点 + 2测点 · 安装实训</div>

    <!-- System diagram on start screen -->
    <canvas id="startDiagramCanvas" width="680" height="320"></canvas>

    <div class="start-steps" id="startStepsList"></div>
    <button class="btn-start" onclick="startGame()">开 始 安 装</button>
  </div>
</div>

<!-- ==================== GAME SCREEN ==================== -->
<div id="gameScreen" class="screen">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-title">🔧 静力水准安装</div>
    </div>
    <div class="top-bar-center">
      <div class="stat-item">
        <span class="stat-icon">⭐</span>
        <span class="stat-value" id="scoreDisplay">0</span>
        <span class="stat-label">分</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">⏱️</span>
        <span class="stat-value" id="timerDisplay">00:00</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="progressText">0/10</span>
    </div>
    <div class="top-bar-right">
      <button class="btn-hint" id="hintBtn" onclick="showHint()">💡 提示</button>
    </div>
  </div>

  <!-- Game Body -->
  <div class="game-body">
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-title">工具 / 部件</div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <canvas id="gameCanvas"></canvas>
      <div class="step-info" id="stepInfo">
        <div class="step-info-title" id="stepInfoTitle"></div>
        <div class="step-info-desc" id="stepInfoDesc"></div>
      </div>
      <div class="hint-panel" id="hintPanel">
        <div class="hint-panel-title">💡 操作提示</div>
        <div id="hintText"></div>
      </div>
      <div class="feedback-overlay" id="feedbackOverlay"></div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="right-panel-title">安装步骤</div>
      <div id="stepList"></div>
    </div>
  </div>
</div>

<!-- ==================== END SCREEN (可最小化弹窗) ==================== -->
<div id="endScreen" class="end-popup">
  <div class="end-popup-titlebar">
    <span class="end-popup-title">🏆 安装完成 — 评分结果</span>
    <div class="end-popup-btns">
      <button class="end-popup-btn" onclick="minimizeEndScreen()" title="最小化">─</button>
      <button class="end-popup-btn" onclick="closeEndScreen()" title="关闭并重新开始">✕</button>
    </div>
  </div>
  <div class="end-popup-body">
    <div class="end-icon">🎉</div>
    <div class="end-title">安装完成!</div>
    <div class="end-subtitle">自动化静力水准系统已成功安装</div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-grade" id="endGrade"></div>
    <div class="end-grade-label">综合评级</div>
    <div class="end-stats">
      <div class="end-stat-card">
        <div class="end-stat-value" id="endScore">0</div>
        <div class="end-stat-label">总得分</div>
      </div>
      <div class="end-stat-card">
        <div class="end-stat-value" id="endTime">00:00</div>
        <div class="end-stat-label">总用时</div>
      </div>
      <div class="end-stat-card">
        <div class="end-stat-value" id="endAccuracy">0%</div>
        <div class="end-stat-label">操作准确率</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restartGame()">再 来 一 次</button>
  </div>
</div>
<!-- 最小化后显示的底栏 -->
<div id="endScreenMinimized" class="end-minimized-bar" onclick="restoreEndScreen()" style="display:none;">
  🏆 安装完成 — 点击查看评分
</div>

<script>
// ============================
// GAME DATA — 10个安装步骤 (1基准点+2测点)
// ============================
const STEPS = [
  {
    id: 1,
    title: '测点布局设计',
    desc: '标记基准点和2个测点位置。基准点选在结构稳定区域（如桥墩），测点布置在需监测位置，间距30-50m。',
    hint: '拖拽「📍 布局标记」到地面3个安装位置。基准点必须选在结构稳定、不易沉降的位置！',
    tool: { emoji: '📍', name: '布局标记' },
    score: 100,
  },
  {
    id: 2,
    title: '安装储液罐',
    desc: '将储液罐安装在最上方（高于所有水准仪约20cm）。所有测点水准仪通过管路与储液罐连通，形成连通器原理。',
    hint: '拖拽「🫙 储液罐」到上方安装位置。储液罐必须高于各测点水准仪约20cm！',
    tool: { emoji: '🫙', name: '储液罐' },
    score: 100,
  },
  {

// ============================
// DRAW START SCREEN DIAGRAM
// ============================
(function drawStartDiagram() {
  const cw = startDiagramCanvas.width;
  const ch = startDiagramCanvas.height;
  const cx = cw / 2;
  const baseY = ch * 0.78;

  // Background
  const grad = startCtx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0, '#0f1b3d');
  grad.addColorStop(0.6, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  startCtx.fillStyle = grad;
  startCtx.fillRect(0, 0, cw, ch);

  // Grid
  startCtx.strokeStyle = 'rgba(0, 212, 170, 0.04)';
  startCtx.lineWidth = 1;
  for (let x = 0; x < cw; x += 40) {
    startCtx.beginPath(); startCtx.moveTo(x, 0); startCtx.lineTo(x, ch); startCtx.stroke();
  }
  for (let y = 0; y < ch; y += 40) {
    startCtx.beginPath(); startCtx.moveTo(0, y); startCtx.lineTo(cw, y); startCtx.stroke();
  }

  // Ground
  const groundGrad = startCtx.createLinearGradient(0, baseY, 0, ch);
  groundGrad.addColorStop(0, '#2d3a2e');
  groundGrad.addColorStop(1, '#1a261a');
  startCtx.fillStyle = groundGrad;
  startCtx.fillRect(0, baseY, cw, ch - baseY);
  startCtx.strokeStyle = '#4a7c4a';
  startCtx.lineWidth = 2;
  startCtx.beginPath();
  startCtx.moveTo(0, baseY);
  startCtx.lineTo(cw, baseY);
  startCtx.stroke();

  // === Draw system components ===

  // Tank at top center
  const tankX = cx - 285;
  const tankY = baseY - 310;
  const tankW = 90;
  const tankH = 85;
  startCtx.fillStyle = '#2c3e50';
  startCtx.strokeStyle = '#5b8bc0';
  startCtx.lineWidth = 1.5;
  roundRect(startCtx, tankX, tankY, tankW, tankH, 6);
  startCtx.fill();
  startCtx.stroke();

  // Tank liquid (1/2)
  startCtx.fillStyle = 'rgba(6, 182, 212, 0.5)';
  roundRect(startCtx, tankX + 10, tankY + tankH * 0.45, tankW - 20, tankH * 0.45, 3);
  startCtx.fill();

  // Tank label (left of tank)
  startCtx.fillStyle = 'rgba(255,255,255,0.9)';
  startCtx.font = 'bold 13px "Noto Sans SC"';
  startCtx.textAlign = 'right';
  startCtx.fillText('储液罐', tankX - 8, tankY + tankH / 2 + 4);

  // Tank to benchmark (daisy chain)
  startCtx.strokeStyle = 'rgba(0, 212, 170, 0.3)';
  startCtx.lineWidth = 1;
  startCtx.setLineDash([4, 3]);

  const gaugeY = baseY - 185;

  // Benchmark → Gauge 1 → Gauge 2 (串连示意)
  startCtx.beginPath();
  startCtx.moveTo(cx - 240, gaugeY);
  startCtx.lineTo(cx, gaugeY);
  startCtx.stroke();

  startCtx.beginPath();
  startCtx.moveTo(cx, gaugeY);
  startCtx.lineTo(cx + 240, gaugeY);
  startCtx.stroke();

  startCtx.setLineDash([]);

  // 3 gauges below
  const gaugePositions = [
    { x: cx - 240, label: '基准点', sub: '(稳定结构)', color: '#00d4aa' },
    { x: cx, label: '测点1', sub: '(被监测结构)', color: '#0ea5e9' },
    { x: cx + 240, label: '测点2', sub: '(被监测结构)', color: '#0ea5e9' },
  ];

  gaugePositions.forEach(g => {
    const gx = g.x - 32;
    const gy = gaugeY;
    const gw = 65;
    const gh = 80;

    // Gauge body
    startCtx.fillStyle = '#1e3a5f';
    startCtx.strokeStyle = '#4a8bc2';
    startCtx.lineWidth = 1;
    roundRect(startCtx, gx, gy, gw, gh, 4);
    startCtx.fill();
    startCtx.stroke();

    // Level bubble
    startCtx.fillStyle = 'rgba(255,255,255,0.15)';
    startCtx.beginPath();
    startCtx.arc(g.x, gy + 16, 8, 0, Math.PI * 2);
    startCtx.fill();
    startCtx.fillStyle = '#00d4aa';
    startCtx.beginPath();
    startCtx.arc(g.x, gy + 16, 2.5, 0, Math.PI * 2);
    startCtx.fill();

    // Label
    startCtx.fillStyle = g.color;
    startCtx.font = 'bold 11px "Noto Sans SC"';
    startCtx.textAlign = 'center';
    startCtx.fillText(g.label, g.x, gy + gh + 18);
    startCtx.fillStyle = 'rgba(255,255,255,0.4)';
    startCtx.font = '8px "Noto Sans SC"';
    startCtx.fillText(g.sub, g.x, gy + gh + 34);
  });

  // Title overlay
  startCtx.fillStyle = 'rgba(0,212,170,0.1)';
  roundRect(startCtx, cx - 140, 12, 280, 32, 8);
  startCtx.fill();
  startCtx.strokeStyle = 'rgba(0,212,170,0.3)';
  startCtx.lineWidth = 1;
  roundRect(startCtx, cx - 140, 12, 280, 32, 8);
  startCtx.stroke();
  startCtx.fillStyle = '#00d4aa';
  startCtx.font = 'bold 14px "Noto Sans SC"';
  startCtx.textAlign = 'center';
  startCtx.fillText('🏗️ 系统布局：1储液罐 + 1基准点 + 2测点', cx, 34);

  // Ground dots
  for (let i = 0; i < 20; i++) {
    startCtx.fillStyle = 'rgba(74, 124, 74, 0.3)';
    startCtx.beginPath();
    startCtx.arc(Math.random() * cw, baseY + 10 + Math.random() * (ch - baseY - 20), 1 + Math.random() * 2, 0, Math.PI * 2);
    startCtx.fill();
  }
})();

// ============================
// INIT START SCREEN STEPS LIST
// ============================
(function initStartScreen() {
  const list = document.getElementById('startStepsList');
  STEPS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'start-step-item';
    div.innerHTML = `<div class="start-step-num">${i + 1}</div><br>${s.title}`;
    list.appendChild(div);
  });
})();

// ============================
// SCREEN MANAGEMENT
// ============================
function showScreen(screen) {
  [startScreen, gameScreen].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
}

// ============================
// START GAME
// ============================
function startGame() {
  gameState = {
    currentStep: 0,
    score: 0,
    totalAttempts: 0,
    correctAttempts: 0,
    startTime: Date.now(),
    timerInterval: null,
    elapsedSeconds: 0,
    hintsUsed: 0,
    completed: false,
    dropZoneRect: null,
  };
  groundDots = [];
  showScreen(gameScreen);
  resizeCanvas();
  buildToolbar();
  buildStepList();
  updateUI();
  startTimer();
  startAnimation();
}

function restartGame() {
  stopTimer();
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  touchDragStep = null;
  dragData = null;
  hintPanel.classList.remove('show');
  showScreen(startScreen);
}

// ============================
// TIMER
// ============================
function startTimer() {
  clearInterval(gameState.timerInterval);
  gameState.startTime = Date.now();
  gameState.timerInterval = setInterval(() => {
    gameState.elapsedSeconds = Math.floor((Date.now() - gameState.startTime) / 1000);
    const m = String(Math.floor(gameState.elapsedSeconds / 60)).padStart(2, '0');
    const s = String(gameState.elapsedSeconds % 60).padStart(2, '0');
    timerDisplay.textContent = `${m}:${s}`;
  }, 500);
}

function stopTimer() {
  clearInterval(gameState.timerInterval);
}

// ============================
// CANVAS SIZING
// ============================
function resizeCanvas() {
  const area = canvasArea;
  const w = area.clientWidth - 40;
  const h = area.clientHeight - 120;
  canvas.width = Math.max(680, w);
  canvas.height = Math.max(480, h);
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  groundDots = [];
}
window.addEventListener('resize', () => {
  if (gameScreen.classList.contains('active') && !gameState.completed) {
    resizeCanvas();
    drawScene();
  }
});

// ============================
// TOOLBAR
// ============================
function buildToolbar() {
  const items = toolbar.querySelectorAll('.tool-item');
  items.forEach(i => i.remove());

  STEPS.forEach((step, idx) => {
    const div = document.createElement('div');
    div.className = 'tool-item';
    div.dataset.stepIndex = idx;
    if (idx < gameState.currentStep) div.classList.add('used');
    div.innerHTML = `<span class="tool-emoji">${step.tool.emoji}</span><span class="tool-name">${step.tool.name}</span>`;
    div.setAttribute('draggable', idx === gameState.currentStep ? 'true' : 'false');
    if (idx !== gameState.currentStep) div.style.opacity = idx < gameState.currentStep ? '0.3' : '0.5';

    div.addEventListener('dragstart', onDragStart);
    div.addEventListener('dragend', onDragEnd);

    toolbar.appendChild(div);
  });
}

// ============================
// STEP LIST (Right Panel)
// ============================
function buildStepList() {
  stepList.innerHTML = '';
  STEPS.forEach((step, idx) => {
    const div = document.createElement('div');
    div.className = 'step-list-item';
    if (idx < gameState.currentStep) div.classList.add('completed');
    if (idx === gameState.currentStep) div.classList.add('active');
    div.innerHTML = `<span class="step-list-num">${idx + 1}</span><span>${step.title}</span>`;
    stepList.appendChild(div);
  });
}

// ============================
// UPDATE UI
// ============================
function updateUI() {
  const step = STEPS[gameState.currentStep];
  scoreDisplay.textContent = gameState.score;
  const completed = gameState.currentStep;
  const total = STEPS.length;
  progressBar.style.width = (completed / total * 100) + '%';
  progressText.textContent = `${completed}/${total}`;

  if (step) {
    stepInfoTitle.textContent = `步骤 ${step.id}：${step.title}`;
    stepInfoDesc.textContent = step.desc;
  } else if (gameState.completed) {
    stepInfoTitle.textContent = '安装完成！';
    stepInfoDesc.textContent = '所有步骤已完成，正在生成报告...';
  }

  hintBtn.disabled = gameState.completed;
  hintPanel.classList.remove('show');
}

// ============================
// HINT
// ============================
function showHint() {
  if (gameState.completed) return;
  const step = STEPS[gameState.currentStep];
  if (!step) return;
  gameState.hintsUsed++;
  hintText.textContent = step.hint;
  hintPanel.classList.add('show');
  setTimeout(() => hintPanel.classList.remove('show'), 6000);
}

// ============================
// FEEDBACK
// ============================
function showFeedback(correct) {
  feedbackOverlay.className = 'feedback-overlay ' + (correct ? 'correct' : 'wrong');
  feedbackOverlay.textContent = correct ? '✓ 操作正确！' : '✗ 操作错误，请重试';
  feedbackOverlay.classList.add('show');
  setTimeout(() => feedbackOverlay.classList.remove('show'), 1200);
}

// ============================
// DRAG & DROP (PC)
// ============================
let dragData = null;

function onDragStart(e) {
  const idx = parseInt(e.currentTarget.dataset.stepIndex);
  if (idx !== gameState.currentStep) { e.preventDefault(); return; }
  dragData = { stepIndex: idx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', idx.toString());

  const step = STEPS[idx];
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.textContent = step.tool.emoji + ' ' + step.tool.name;
  ghost.style.top = '-9999px';
  ghost.style.left = '-9999px';
  document.body.appendChild(ghost);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ghost.remove();
    });
  });
  e.dataTransfer.setDragImage(ghost, ghost.offsetWidth / 2, ghost.offsetHeight / 2);
}

function onDragEnd(e) {
  dragData = null;
}

canvas.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const zone = getDropZoneForCurrentStep();
  if (zone) {
    canvas.style.cursor = 'copy';
  }
});

canvas.addEventListener('dragleave', (e) => {
  canvas.style.cursor = 'default';
});

canvas.addEventListener('drop', (e) => {
  e.preventDefault();
  canvas.style.cursor = 'default';

  if (!dragData && dragData !== 0) return;
  const idx = dragData.stepIndex;
  if (idx !== gameState.currentStep) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  const zone = getDropZoneForCurrentStep();
  if (!zone) return;

  const inZone = x >= zone.x && x <= zone.x + zone.w && y >= zone.y && y <= zone.y + zone.h;

  gameState.totalAttempts++;

  if (inZone) {
    gameState.correctAttempts++;
    const step = STEPS[gameState.currentStep];
    const penalty = Math.min(gameState.hintsUsed * 10, 30);
    const points = Math.max(step.score - penalty, 50);
    gameState.score += points;
    gameState.hintsUsed = 0;

    showFeedback(true);
    flashTool(gameState.currentStep, 'correct-flash');

    gameState.currentStep++;

    if (gameState.currentStep >= STEPS.length) {
      gameState.completed = true;
      stopTimer();
      buildToolbar();
      buildStepList();
      updateUI();
      drawScene();
      setTimeout(showEndScreen, 1500);
    } else {
      buildToolbar();
      buildStepList();
      updateUI();
      drawScene();
    }
  } else {
    showFeedback(false);
    flashTool(gameState.currentStep, 'wrong-flash');
    gameState.score = Math.max(0, gameState.score - 20);
    updateUI();
  }

  dragData = null;
});

function flashTool(stepIndex, className) {
  const toolItems = toolbar.querySelectorAll('.tool-item');
  toolItems.forEach(item => {
    if (parseInt(item.dataset.stepIndex) === stepIndex) {
      item.classList.add(className);
      setTimeout(() => item.classList.remove(className), 600);
    }
  });
}

// ============================
// DROP ZONES — 1基准点+2测点布局
// ============================
function getDropZoneForCurrentStep() {
  const cw = canvas.width;
  const ch = canvas.height;
  const step = gameState.currentStep;
  if (step >= STEPS.length) return null;

  const cx = cw / 2;
  const baseY = ch * 0.78;

  switch (step) {
    case 0: // 布局标记 - 地面3个位置
      return { x: cx - 300, y: baseY - 60, w: 600, h: 70 };
    case 1: // 储液罐 - 上方
      return { x: cx - 295, y: baseY - 330, w: 110, h: 90 };
    case 2: // 基准点水准仪 - 左下
      return { x: cx - 310, y: baseY - 210, w: 80, h: 130 };
    case 3: // 测点1水准仪 - 中下
      return { x: cx - 40, y: baseY - 210, w: 80, h: 130 };
    case 4: // 测点2水准仪 - 右下
      return { x: cx + 200, y: baseY - 210, w: 80, h: 130 };
    case 5: // 通液管 - 管路区域
      return { x: cx - 300, y: baseY - 280, w: 600, h: 50 };
    case 6: // 通气管 - 顶部
      return { x: cx - 310, y: baseY - 350, w: 660, h: 35 };
    case 7: // 485信号线 - 右侧串联路径
      return { x: cx + 200, y: baseY - 170, w: 150, h: 80 };
    case 8: // 充液 - 储液罐注液口
      return { x: cx - 260, y: baseY - 325, w: 40, h: 30 };
    case 9: // 3个独立防护罩 - 覆盖3台水准仪
      return { x: cx - 290, y: baseY - 210, w: 580, h: 180 };
    case 10: // 数据采集器 - 右侧采集器位置
      return { x: cx + 260, y: baseY - 200, w: 140, h: 100 };
    case 11: // 电箱保护 - 右侧电箱位置
      return { x: cx + 260, y: baseY - 90, w: 140, h: 100 };
    default:
      return null;
  }
}

// ============================
// DRAWING — 1基准点+2测点布局
// ============================
function drawScene() {
  const cw = canvas.width;
  const ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  const cx = cw / 2;
  const baseY = ch * 0.78;
  const completed = gameState.currentStep;

  // Background
  drawBackground(cw, ch);

  // Ground
  drawGround(cw, ch, baseY);

  // Step 0 done: 3位置标记
  if (completed > 0) {
    drawLocationMarkers(cx, baseY);
  }

  // Step 1 done: 储液罐
  if (completed > 1) {
    drawTank(cx, baseY);
  }

  // Step 2 done: 基准点水准仪 (左)
  if (completed > 2) {
    drawLevelGauge(cx - 240, baseY, '基准点', '#00d4aa');
  }

  // Step 3 done: 测点1水准仪 (中)
  if (completed > 3) {
    drawLevelGauge(cx, baseY, '测点1', '#0ea5e9');
  }

  // Step 4 done: 测点2水准仪 (右)
  if (completed > 4) {
    drawLevelGauge(cx + 240, baseY, '测点2', '#0ea5e9');
  }

  // Step 5 done: 通液管 (3条)
  if (completed > 5) {
    drawLiquidPipes(cx, baseY);
  }

  // Step 6 done: 通气管
  if (completed > 6) {
    drawAirPipe(cx, baseY);
  }

  // Step 7 done: 485信号线
  if (completed > 7) {
    drawSignalCable(cx, baseY);
  }

  // Step 8 done: 充液效果
  if (completed > 8) {
    drawFilledLiquid(cx, baseY);
  }

  // Step 9 done: 密封+采集器+3个独立保护罩
  if (completed > 9) {
    drawSeal(cx, baseY);
    drawDataCollector(cx, baseY);
    drawProtectiveCovers(cx, baseY);
  }

  // Drop zone for current step
  if (!gameState.completed) {
    drawDropZone();
  }

  // Step indicator
  if (!gameState.completed) {
    drawStepIndicator(cw, ch);
  }
}

function drawBackground(cw, ch) {
  const grad = ctx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0, '#0f1b3d');
  grad.addColorStop(0.6, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // Grid lines
  ctx.strokeStyle = 'rgba(0, 212, 170, 0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < cw; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
  }
  for (let y = 0; y < ch; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
  }
}

function drawGround(cw, ch, baseY) {
  const grad = ctx.createLinearGradient(0, baseY, 0, ch);
  grad.addColorStop(0, '#2d3a2e');
  grad.addColorStop(1, '#1a261a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, baseY, cw, ch - baseY);

  // Ground surface line
  ctx.strokeStyle = '#4a7c4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, baseY);
  ctx.lineTo(cw, baseY);
  ctx.stroke();

  // Ground texture dots (cached)
  if (groundDots.length === 0) {
    for (let i = 0; i < 35; i++) {
      groundDots.push({
        x: Math.random() * cw,
        y: baseY + 10 + Math.random() * (ch - baseY - 20),
        r: 1 + Math.random() * 2,
      });
    }
  }
  ctx.fillStyle = 'rgba(74, 124, 74, 0.3)';
  groundDots.forEach(dot => {
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

/** 步骤0：3个位置标记 (基准点左、测点1中、测点2右) */
function drawLocationMarkers(cx, baseY) {
  const positions = [
    { x: cx - 240, label: '基准点', color: '#00d4aa' },
    { x: cx, label: '测点1', color: '#0ea5e9' },
    { x: cx + 240, label: '测点2', color: '#f59e0b' },
  ];

  positions.forEach(p => {
    ctx.save();

    // Ground marker pin
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, baseY - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Pin stem
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 1.5, baseY - 12, 3, 10);

    // Animated ring
    const t = Date.now() / 1000;
    const ringR = 10 + Math.sin(t + p.x) * 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(p.x, baseY - 12, ringR, 0, Math.PI * 2);
    ctx.stroke();

    // Label above
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = 'bold 11px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText(p.label, p.x, baseY - 20);

    // Distance indicators between markers
    if (p.x === cx - 240) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '8px "Noto Sans SC"';
      ctx.fillText('30-50m', cx - 95, baseY - 36);
    }
    if (p.x === cx) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '8px "Noto Sans SC"';
      ctx.fillText('30-50m', cx + 35, baseY - 36);
    }

    ctx.restore();
  });
}

/** 步骤1：储液罐 (上方中央) */
function drawTank(cx, baseY) {
  ctx.save();
  const tankX = cx - 285;
  const tankY = baseY - 310;
  const tankW = 90;
  const tankH = 85;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, tankX + 4, tankY + 4, tankW, tankH, 6);
  ctx.fill();

  // Tank body gradient
  const grad = ctx.createLinearGradient(tankX, tankY, tankX + tankW, tankY);
  grad.addColorStop(0, '#2c3e50');
  grad.addColorStop(0.3, '#4a6fa5');
  grad.addColorStop(0.7, '#4a6fa5');
  grad.addColorStop(1, '#2c3e50');
  ctx.fillStyle = grad;
  roundRect(ctx, tankX, tankY, tankW, tankH, 6);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#5b8bc0';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tankX, tankY, tankW, tankH, 6);
  ctx.stroke();

  // Inside tank liquid area
  const lrx = tankX + 14;
  const lry = tankY + 18;
  const lrw = tankW - 28;
  const lrh = tankH - 36;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  roundRect(ctx, lrx, lry, lrw, lrh, 3);
  ctx.fill();

  // Liquid level (1/2)
  const liquidLevel = lry + lrh * 0.45;
  const liquidGrad = ctx.createLinearGradient(0, liquidLevel, 0, lry + lrh);
  liquidGrad.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
  liquidGrad.addColorStop(1, 'rgba(6, 182, 212, 0.7)');
  ctx.fillStyle = liquidGrad;
  roundRect(ctx, lrx, liquidLevel, lrw, lry + lrh - liquidLevel, 2);
  ctx.fill();

  // Liquid surface wave
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const t = Date.now() / 1000;
  for (let i = 0; i <= lrw; i += 2) {
    const wy = liquidLevel + Math.sin(t * 2 + i * 0.1) * 1.5;
    if (i === 0) ctx.moveTo(lrx + i, wy);
    else ctx.lineTo(lrx + i, wy);
  }
  ctx.stroke();

  // Tank top cap
  ctx.fillStyle = '#3b5a7a';
  ctx.fillRect(tankX - 4, tankY - 5, tankW + 8, 7);
  ctx.strokeStyle = '#5b8bc0';
  ctx.lineWidth = 1;
  ctx.strokeRect(tankX - 4, tankY - 5, tankW + 8, 7);

  // Inlet port on top
  ctx.fillStyle = '#4a6fa5';
  ctx.fillRect(cx - 6, tankY - 14, 12, 9);
  ctx.strokeStyle = '#5b8bc0';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - 6, tankY - 14, 12, 9);

  // "1/2" label
  ctx.fillStyle = 'rgba(6, 182, 212, 0.9)';
  ctx.font = '10px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('1/2', tankX + tankW + 4, liquidLevel + 4);

  // Name label (left of tank)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.font = 'bold 12px "Noto Sans SC"';
  ctx.textAlign = 'right';
  ctx.fillText('储液罐', tankX - 8, tankY + tankH / 2 + 4);

  // Outlet port at bottom (connects to 基准点)
  ctx.fillStyle = '#5b8bc0';
  ctx.beginPath();
  ctx.arc(cx, tankY + tankH, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/** 步骤2-4：水准仪 (基准点/测点1/测点2) */
function drawLevelGauge(gaugeCx, baseY, label, accentColor) {
  ctx.save();
  const gx = gaugeCx - 32;
  const gy = baseY - 185;
  const gw = 65;
  const gh = 120;

  // Support bracket
  ctx.fillStyle = '#6b7280';
  ctx.fillRect(gx - 6, gy + gh, gw + 12, 7);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(gx - 4, gy + gh + 2, gw + 8, 3);

  // Body shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  roundRect(ctx, gx + 3, gy + 3, gw, gh, 5);
  ctx.fill();

  // Main body
  const bodyGrad = ctx.createLinearGradient(gx, gy, gx + gw, gy);
  bodyGrad.addColorStop(0, '#1e3a5f');
  bodyGrad.addColorStop(0.3, '#2d5a8e');
  bodyGrad.addColorStop(0.7, '#2d5a8e');
  bodyGrad.addColorStop(1, '#1e3a5f');
  ctx.fillStyle = bodyGrad;
  roundRect(ctx, gx, gy, gw, gh, 5);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#4a8bc2';
  ctx.lineWidth = 1.5;
  roundRect(ctx, gx, gy, gw, gh, 5);
  ctx.stroke();

  // Top cover
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(gx - 3, gy - 3, gw + 6, 5);
  ctx.strokeStyle = '#4a8bc2';
  ctx.lineWidth = 1;
  ctx.strokeRect(gx - 3, gy - 3, gw + 6, 5);

  // Bubble level
  ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
  ctx.beginPath();
  ctx.arc(gaugeCx, gy + 18, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(gaugeCx, gy + 18, 11, 0, Math.PI * 2);
  ctx.stroke();

  // Bubble
  ctx.fillStyle = accentColor;
  ctx.shadowColor = accentColor;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(gaugeCx, gy + 18, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(gaugeCx - 8, gy + 18); ctx.lineTo(gaugeCx + 8, gy + 18);
  ctx.moveTo(gaugeCx, gy + 10); ctx.lineTo(gaugeCx, gy + 26);
  ctx.stroke();

  // "<0.1°" text
  ctx.fillStyle = 'rgba(0, 212, 170, 0.7)';
  ctx.font = '7px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('<0.1°', gaugeCx, gy + 36);

  // Center viewing window
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  roundRect(ctx, gx + 8, gy + 40, gw - 16, 42, 3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(74, 139, 194, 0.4)';
  ctx.lineWidth = 0.5;
  roundRect(ctx, gx + 8, gy + 40, gw - 16, 42, 3);
  ctx.stroke();

  // Sensor inside window
  ctx.fillStyle = '#f59e0b';
  roundRect(ctx, gaugeCx - 8, gy + 48, 16, 22, 2);
  ctx.fill();

  // Adjustment bolts
  [-18, 18].forEach(offset => {
    ctx.fillStyle = '#9ca3af';
    ctx.beginPath();
    ctx.arc(gaugeCx + offset, gy + gh - 10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#6b7280';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(gaugeCx + offset, gy + gh - 10, 4, 0, Math.PI * 2);
    ctx.stroke();
    // Cross slot
    ctx.strokeStyle = '#6b7280';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(gaugeCx + offset - 2.5, gy + gh - 10);
    ctx.lineTo(gaugeCx + offset + 2.5, gy + gh - 10);
    ctx.moveTo(gaugeCx + offset, gy + gh - 12.5);
    ctx.lineTo(gaugeCx + offset, gy + gh - 7.5);
    ctx.stroke();
  });

  // Expansion bolt
  ctx.fillStyle = '#9ca3af';
  ctx.fillRect(gaugeCx - 1.5, gy + gh, 3, 8);
  ctx.beginPath();
  ctx.arc(gaugeCx, gy + gh + 8, 3, 0, Math.PI * 2);
  ctx.fill();

  // Label
  ctx.fillStyle = accentColor;
  ctx.font = 'bold 10px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText(label, gaugeCx, gy - 10);

  ctx.restore();
}

/** 步骤5：通液管 (串联：储液罐→基准点→测点1→测点2) */
function drawLiquidPipes(cx, baseY) {
  ctx.save();
  const tankBottom = baseY - 310 + 85;
  const gaugeY = baseY - 185 + 5;
  const gx = [cx - 240, cx, cx + 240];
  const tankCX = gx[0]; // 储液罐中心与基准点对齐

  // === 管路1：储液罐 → 基准点 (竖向弯管) ===
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(tankCX, tankBottom);
  ctx.quadraticCurveTo(tankCX, (tankBottom + gaugeY) / 2, gx[0] + 5, gaugeY);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tankCX, tankBottom);
  ctx.quadraticCurveTo(tankCX, (tankBottom + gaugeY) / 2, gx[0] + 5, gaugeY);
  ctx.stroke();

  // === 管路2：基准点 → 测点1 (横向) ===
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(gx[0] + 5, gaugeY);
  ctx.lineTo(gx[1] - 5, gaugeY);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(gx[0] + 5, gaugeY);
  ctx.lineTo(gx[1] - 5, gaugeY);
  ctx.stroke();

  // === 管路3：测点1 → 测点2 (横向) ===
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(gx[1] + 5, gaugeY);
  ctx.lineTo(gx[2] - 5, gaugeY);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(gx[1] + 5, gaugeY);
  ctx.lineTo(gx[2] - 5, gaugeY);
  ctx.stroke();

  // === 连接点 ===
  ctx.fillStyle = '#0891b2';
  ctx.beginPath(); ctx.arc(tankCX, tankBottom, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[0] + 5, gaugeY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[1] - 5, gaugeY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[1] + 5, gaugeY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[2] - 5, gaugeY, 4, 0, Math.PI * 2); ctx.fill();

  // 技术参数
  ctx.fillStyle = 'rgba(6, 182, 212, 0.6)';
  ctx.font = '9px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('倾角≥3‰', tankCX + 8, (tankBottom + gaugeY) / 2 + 4);

  ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
  ctx.font = '8px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('串联 · 弯曲半径≥5D', (gx[0] + gx[2]) / 2, gaugeY + 18);

  ctx.fillStyle = 'rgba(6, 182, 212, 0.9)';
  ctx.font = 'bold 11px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('通液管 (PU管)', gx[0], gaugeY + 34);

  ctx.restore();
}

/** 步骤6：通气管 (串联：储液罐顶部→基准点→测点1→测点2) */
function drawAirPipe(cx, baseY) {
  ctx.save();
  const tankTop = baseY - 310 - 14;          // 储液罐顶部注液口
  const gaugeTop = baseY - 185 + 5 - 25;       // 水准仪上方气管高度
  const gx = [cx - 240, cx, cx + 240];
  const tankCX = gx[0]; // 储液罐中心与基准点对齐

  // 紫色调
  const color = '#a78bfa';
  const colorLight = 'rgba(167, 139, 250, 0.25)';

  // === 管路1：储液罐顶部 → 基准点上方 (竖向弯管) ===
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(tankCX, tankTop);
  ctx.quadraticCurveTo(tankCX, (tankTop + gaugeTop) / 2, gx[0] + 5, gaugeTop);
  ctx.stroke();

  ctx.strokeStyle = colorLight;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(tankCX, tankTop);
  ctx.quadraticCurveTo(tankCX, (tankTop + gaugeTop) / 2, gx[0] + 5, gaugeTop);
  ctx.stroke();

  // === 管路2：基准点上方 → 测点1上方 (横向) ===
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(gx[0] + 5, gaugeTop);
  ctx.lineTo(gx[1] - 5, gaugeTop);
  ctx.stroke();

  ctx.strokeStyle = colorLight;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(gx[0] + 5, gaugeTop);
  ctx.lineTo(gx[1] - 5, gaugeTop);
  ctx.stroke();

  // === 管路3：测点1上方 → 测点2上方 (横向) ===
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(gx[1] + 5, gaugeTop);
  ctx.lineTo(gx[2] - 5, gaugeTop);
  ctx.stroke();

  ctx.strokeStyle = colorLight;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(gx[1] + 5, gaugeTop);
  ctx.lineTo(gx[2] - 5, gaugeTop);
  ctx.stroke();

  // === 通大气端 (测点2右侧) ===
  ctx.fillStyle = '#c4b5fd';
  ctx.beginPath();
  ctx.moveTo(gx[2] + 5, gaugeTop - 6);
  ctx.lineTo(gx[2] + 15, gaugeTop);
  ctx.lineTo(gx[2] + 5, gaugeTop + 6);
  ctx.closePath();
  ctx.fill();

  // "通大气" label
  ctx.fillStyle = 'rgba(196, 181, 253, 0.8)';
  ctx.font = '9px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('通大气', gx[2] + 17, gaugeTop + 4);

  // === 连接点标记 ===
  ctx.fillStyle = '#8b5cf6';
  ctx.beginPath(); ctx.arc(tankCX, tankTop, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[0] + 5, gaugeTop, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[1] - 5, gaugeTop, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[1] + 5, gaugeTop, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(gx[2] - 5, gaugeTop, 4, 0, Math.PI * 2); ctx.fill();

  // "仅一端通大气" label
  ctx.fillStyle = 'rgba(196, 181, 253, 0.5)';
  ctx.font = '8px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('仅一端通大气', gx[0] + 5, gaugeTop + 18);

  // 总标注
  ctx.fillStyle = 'rgba(167, 139, 250, 0.9)';
  ctx.font = 'bold 11px "Noto Sans SC"';
  ctx.textAlign = 'left';
  ctx.fillText('通气管', gx[0] + 5, gaugeTop - 12);

  ctx.restore();
}

/** 步骤7：485信号线 (虚线串联) */
function drawSignalCable(cx, baseY) {
  ctx.save();

  // 3 gauges in series: 基准点→测点1→测点2→采集器
  const points = [
    { x: cx - 240 + 32, y: baseY - 140 },
    { x: cx + 32, y: baseY - 140 },
    { x: cx + 240 + 32, y: baseY - 140 },
    { x: cx + 320, y: baseY - 140 },
  ];

  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.setLineDash([6, 3]);

  // Series connection
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Inner highlight
  ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 3]);
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Waterproof connectors
  ctx.fillStyle = '#dc2626';
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // "串联" label
  ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
  ctx.font = '9px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('防水自锁插头', cx + 60, baseY - 145);

  // Label
  ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
  ctx.font = 'bold 11px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('485信号线 (串联)', cx, baseY - 155);

  ctx.restore();
}

/** 步骤8：充液效果 */
function drawFilledLiquid(cx, baseY) {
  ctx.save();
  const tankX = cx - 285;
  const tankY = baseY - 310;
  const tankW = 90;
  const tankH = 85;

  const t = Date.now() / 1000;

  // Droplet falling from inlet
  ctx.fillStyle = 'rgba(6, 182, 212, 0.7)';
  const dropY = tankY - 18 - Math.abs(Math.sin(t * 2)) * 10;
  ctx.shadowColor = 'rgba(6, 182, 212, 0.3)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(cx, dropY, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Liquid in tank (near 1/2)
  const lrx = tankX + 14;
  const lry = tankY + 18;
  const lrw = tankW - 28;
  const lrh = tankH - 36;
  const liquidLevel = lry + lrh * 0.52;

  const liquidGrad = ctx.createLinearGradient(0, liquidLevel, 0, lry + lrh);
  liquidGrad.addColorStop(0, 'rgba(6, 182, 212, 0.4)');
  liquidGrad.addColorStop(1, 'rgba(6, 182, 212, 0.8)');
  ctx.fillStyle = liquidGrad;
  roundRect(ctx, lrx, liquidLevel, lrw, lry + lrh - liquidLevel, 2);
  ctx.fill();

  // Wave
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= lrw; i += 2) {
    const wy = liquidLevel + Math.sin(t * 3 + i * 0.15) * 2;
    if (i === 0) ctx.moveTo(lrx + i, wy);
    else ctx.lineTo(lrx + i, wy);
  }
  ctx.stroke();

  // Blue liquid flowing in pipes (串联: 储液罐→基准点→测点1→测点2)
  const tankBottom = tankY + tankH;
  const gaugeY = baseY - 185 + 5;
  const gx = [cx - 240, cx, cx + 240];
  const tankCX = gx[0]; // 储液罐中心与基准点对齐

  // 管路1：储液罐→基准点
  ctx.strokeStyle = 'rgba(6, 182, 212, 0.4)';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(tankCX, tankBottom);
  ctx.quadraticCurveTo(tankCX, (tankBottom + gaugeY) / 2, gx[0] + 5, gaugeY);
  ctx.stroke();

  // 管路2：基准点→测点1
  ctx.beginPath();
  ctx.moveTo(gx[0] + 5, gaugeY);
  ctx.lineTo(gx[1] - 5, gaugeY);
  ctx.stroke();

  // 管路3：测点1→测点2
  ctx.beginPath();
  ctx.moveTo(gx[1] + 5, gaugeY);
  ctx.lineTo(gx[2] - 5, gaugeY);
  ctx.stroke();

  // Flow animation along serial path
  ctx.fillStyle = 'rgba(6, 182, 212, 0.5)';
  const totalPath = Math.abs(tankBottom - gaugeY) + (gx[2] - gx[0]);
  const flowPos = (t * 40) % totalPath;

  // Determine which segment the flow dot is on
  const seg1 = Math.abs(tankBottom - gaugeY);  // tank to gauge
  const seg2 = gx[1] - gx[0];  // gauge[0] to gauge[1]
  const seg3 = gx[2] - gx[1];  // gauge[1] to gauge[2]

  let fx, fy;
  if (flowPos < seg1) {
    // On segment 1
    const pct = flowPos / seg1;
    fx = tankCX + (gx[0] + 5 - tankCX) * pct;
    fy = tankBottom + (gaugeY - tankBottom) * pct;
  } else if (flowPos < seg1 + seg2) {
    // On segment 2
    const pct = (flowPos - seg1) / seg2;
    fx = gx[0] + 5 + (gx[1] - gx[0] - 10) * pct;
    fy = gaugeY;
  } else {
    // On segment 3
    const pct = (flowPos - seg1 - seg2) / seg3;
    fx = gx[1] + 5 + (gx[2] - gx[1] - 10) * pct;
    fy = gaugeY;
  }
  ctx.beginPath();
  ctx.arc(fx, fy, 4, 0, Math.PI * 2);
  ctx.fill();

  // Bubbles rising in gauges
  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  [cx - 240, cx, cx + 240].forEach(gx => {
    for (let i = 0; i < 3; i++) {
      const bx = gx - 5 + Math.sin(t + i * 2 + gx * 0.01) * 8;
      const by = baseY - 100 + (t * 12 + i * 25 + gx) % 60;
      ctx.beginPath();
      ctx.arc(bx, by, 1.5 + Math.sin(t + i) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // "排净气泡" label
  ctx.fillStyle = 'rgba(6, 182, 212, 0.8)';
  ctx.font = 'bold 10px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('排净气泡 ↑', tankCX, (tankY + tankH + baseY - 185) / 2 + 25);

  ctx.restore();
}

// ============================
// ANIMATION LOOP
// ============================
let animFrame = null;
function animate() {
  if (gameScreen.classList.contains('active') && !gameState.completed) {
    drawScene();
  }
  animFrame = requestAnimationFrame(animate);
}

function startAnimation() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animate();
}

function stopAnimation() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
}

// ============================
// END SCREEN
// ============================
function showEndScreen() {
  stopAnimation();
  const total = STEPS.reduce((sum, s) => sum + s.score, 0);
  const accuracy = gameState.totalAttempts > 0
    ? Math.round((gameState.correctAttempts / gameState.totalAttempts) * 100)
    : 100;
  const finalScore = gameState.score;

  // Stars
  let stars = 5;
  if (accuracy < 90) stars = 4;
  if (accuracy < 75) stars = 3;
  if (accuracy < 60) stars = 2;
  if (accuracy < 40) stars = 1;

  // Grade
  let grade = 'S';
  let gradeColor = '#fbbf24';
  if (accuracy < 90 || gameState.elapsedSeconds > 300) { grade = 'A'; gradeColor = '#00d4aa'; }
  if (accuracy < 75 || gameState.elapsedSeconds > 480) { grade = 'B'; gradeColor = '#0ea5e9'; }
  if (accuracy < 60) { grade = 'C'; gradeColor = '#f59e0b'; }
  if (accuracy < 40) { grade = 'D'; gradeColor = '#ef4444'; }

  document.getElementById('endScore').textContent = finalScore;
  const m = String(Math.floor(gameState.elapsedSeconds / 60)).padStart(2, '0');
  const s = String(gameState.elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('endTime').textContent = `${m}:${s}`;
  document.getElementById('endAccuracy').textContent = accuracy + '%';

  const starsEl = document.getElementById('endStars');
  starsEl.textContent = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);

  const gradeEl = document.getElementById('endGrade');
  gradeEl.textContent = grade;
  gradeEl.style.color = gradeColor;

  // 显示评分弹窗，不覆盖游戏画面
  const popup = document.getElementById('endScreen');
  popup.classList.add('show');
  document.getElementById('gameScreen').classList.add('behind-popup');
  document.getElementById('endScreenMinimized').style.display = 'none';
}

// ============================
// TOUCH SUPPORT
// ============================
let touchDragStep = null;
let touchGhost = null;

toolbar.addEventListener('touchstart', (e) => {
  const toolItem = e.target.closest('.tool-item');
  if (!toolItem) return;
  const idx = parseInt(toolItem.dataset.stepIndex);
  if (idx !== gameState.currentStep) return;
  touchDragStep = idx;
  e.preventDefault();

  const step = STEPS[idx];
  touchGhost = document.createElement('div');
  touchGhost.className = 'drag-ghost';
  touchGhost.textContent = step.tool.emoji + ' ' + step.tool.name;
  document.body.appendChild(touchGhost);

  const touch = e.touches[0];
  touchGhost.style.left = touch.clientX + 'px';
  touchGhost.style.top = touch.clientY + 'px';
}, { passive: false });

toolbar.addEventListener('touchmove', (e) => {
  if (touchDragStep === null) return;
  e.preventDefault();

  if (touchGhost) {
    const touch = e.touches[0];
    touchGhost.style.left = touch.clientX + 'px';
    touchGhost.style.top = touch.clientY + 'px';
  }
}, { passive: false });

toolbar.addEventListener('touchend', (e) => {
  if (touchDragStep === null) return;

  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;

  const zone = getDropZoneForCurrentStep();
  if (!zone) { touchDragStep = null; return; }

  const inZone = x >= zone.x && x <= zone.x + zone.w && y >= zone.y && y <= zone.y + zone.h;

  gameState.totalAttempts++;

  if (inZone) {
    gameState.correctAttempts++;
    const step = STEPS[gameState.currentStep];
    const penalty = Math.min(gameState.hintsUsed * 10, 30);
    const points = Math.max(step.score - penalty, 50);
    gameState.score += points;
    gameState.hintsUsed = 0;

    showFeedback(true);
    flashTool(gameState.currentStep, 'correct-flash');
    gameState.currentStep++;

    if (gameState.currentStep >= STEPS.length) {
      gameState.completed = true;
      stopTimer();
      buildToolbar();
      buildStepList();
      updateUI();
      drawScene();
      setTimeout(showEndScreen, 1500);
    } else {
      buildToolbar();
      buildStepList();
      updateUI();
      drawScene();
    }
  } else {
    showFeedback(false);
    flashTool(gameState.currentStep, 'wrong-flash');
    gameState.score = Math.max(0, gameState.score - 20);
    updateUI();
  }

  touchDragStep = null;
  if (touchGhost) {
    touchGhost.remove();
    touchGhost = null;
  }
});

toolbar.addEventListener('touchcancel', () => {
  touchDragStep = null;
  if (touchGhost) {
    touchGhost.remove();
    touchGhost = null;
  }
});

// ============================
// UTILITY
// ============================
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 最小化评分弹窗
function minimizeEndScreen() {
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('endScreenMinimized').style.display = 'block';
}
// 恢复评分弹窗
function restoreEndScreen() {
  document.getElementById('endScreen').classList.add('show');
  document.getElementById('endScreenMinimized').style.display = 'none';
}
// 关闭评分弹窗并重新开始
function closeEndScreen() {
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('endScreenMinimized').style.display = 'none';
  document.getElementById('gameScreen').classList.remove('behind-popup');
  restartGame();
}
