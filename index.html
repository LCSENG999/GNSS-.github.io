<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNSS自动化监测设备安装实训 - 现场实操版</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  :root {
    --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-card: #1e2a45;
    --bg-hover: #253355; --accent-cyan: #00d4aa; --accent-blue: #0ea5e9;
    --accent-orange: #f59e0b; --accent-red: #ef4444; --accent-green: #22c55e;
    --text-primary: #e8eaf0; --text-secondary: #94a3b8; --text-dim: #64748b;
    --border: #2d3a56;
  }
  body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; width: 100vw; user-select: none; }
  .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .screen.active { display: flex; }
  #startScreen { flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #0f1b3d 100%); }
  .start-bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px); background-size: 40px 40px; animation: gridMove 20s linear infinite; }
  @keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(40px,40px)} }
  .start-content { position: relative; z-index: 1; text-align: center; max-width: 900px; width: 95%; }
  .start-icon { width: 120px; height: 120px; margin: 0 auto 20px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 56px; box-shadow: 0 10px 40px rgba(0,212,170,0.2); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .start-title { font-size: 36px; font-weight: 900; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .start-subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 16px; font-weight: 300; }
  #startDiagramCanvas { display: block; margin: 0 auto 16px; width: 100%; max-width: 680px; height: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); }
  .start-steps { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; max-width: 900px; margin: 0 auto 20px; padding: 0 10px; }
  .start-step-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; font-size: 10px; color: var(--text-secondary); text-align: center; transition: all 0.3s; }
  .start-step-item:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0,212,170,0.3); }
  .start-step-num { display: inline-block; width: 20px; height: 20px; line-height: 20px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); color: var(--bg-primary); border-radius: 50%; font-size: 10px; font-weight: 700; margin-bottom: 3px; }
  .btn-start { padding: 14px 50px; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); color: var(--bg-primary); border: none; border-radius: 14px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
  .btn-start:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px rgba(0,212,170,0.4); }
  #gameScreen { flex-direction: column; background: var(--bg-primary); }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
  .top-bar-left { display: flex; align-items: center; gap: 16px; }
  .top-bar-title { font-size: 15px; font-weight: 700; color: var(--accent-cyan); white-space: nowrap; }
  .top-bar-center { display: flex; align-items: center; gap: 18px; }
  .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; }
  .stat-icon { font-size: 16px; }
  .stat-value { font-weight: 700; color: var(--accent-cyan); }
  .stat-label { color: var(--text-dim); font-size: 11px; }
  .progress-bar-container { width: 220px; height: 7px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); border-radius: 4px; transition: width 0.5s ease; }
  .progress-text { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .btn-hint { padding: 5px 12px; font-size: 11px; background: transparent; color: var(--accent-orange); border: 1px solid var(--accent-orange); border-radius: 6px; cursor: pointer; transition: all 0.3s; }
  .btn-hint:hover { background: rgba(245,158,11,0.1); }
  .btn-hint:disabled { opacity: 0.4; cursor: not-allowed; }
  .game-body { display: flex; flex: 1; overflow: hidden; }
  .toolbar { width: 150px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex-shrink: 0; }
  .toolbar-title { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; text-align: center; }
  .tool-item { display: flex; align-items: center; gap: 6px; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; cursor: grab; transition: all 0.3s; font-size: 12px; }
  .tool-item:hover { border-color: var(--accent-cyan); background: var(--bg-hover); box-shadow: 0 0 20px rgba(0,212,170,0.3); }
  .tool-item:active { cursor: grabbing; }
  .tool-item.used { opacity: 0.3; pointer-events: none; cursor: default; border-color: transparent; }
  .tool-item.correct-flash { border-color: var(--accent-green); background: rgba(34,197,94,0.1); box-shadow: 0 0 15px rgba(34,197,94,0.3); }
  .tool-item.wrong-flash { border-color: var(--accent-red); background: rgba(239,68,68,0.1); animation: shake 0.5s; }
  .tool-emoji { font-size: 20px; flex-shrink: 0; }
  .tool-name { font-size: 11px; color: var(--text-secondary); line-height: 1.3; }
  .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  #gameCanvas { display: block; border-radius: 8px; }
  .step-info { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(30,42,69,0.95); border: 1px solid var(--border); border-radius: 12px; padding: 10px 22px; text-align: center; max-width: 500px; width: 90%; backdrop-filter: blur(10px); }
  .step-info-title { font-size: 14px; font-weight: 700; color: var(--accent-cyan); margin-bottom: 3px; }
  .step-info-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
  .hint-panel { position: absolute; top: 14px; right: 14px; background: rgba(30,42,69,0.95); border: 1px solid var(--accent-orange); border-radius: 10px; padding: 12px 16px; max-width: 280px; font-size: 11px; color: var(--accent-orange); line-height: 1.5; display: none; backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(245,158,11,0.15); }
  .hint-panel.show { display: block; animation: fadeIn 0.3s; }
  .hint-panel-title { font-weight: 700; margin-bottom: 3px; font-size: 12px; }
  .feedback-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); padding: 16px 32px; border-radius: 14px; font-size: 18px; font-weight: 700; pointer-events: none; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(10px); }
  .feedback-overlay.correct { background: rgba(34,197,94,0.15); border: 2px solid var(--accent-green); color: var(--accent-green); box-shadow: 0 0 30px rgba(34,197,94,0.2); }
  .feedback-overlay.wrong { background: rgba(239,68,68,0.15); border: 2px solid var(--accent-red); color: var(--accent-red); box-shadow: 0 0 30px rgba(239,68,68,0.2); }
  .feedback-overlay.show { opacity: 1; }
  .right-panel { width: 200px; background: var(--bg-secondary); border-left: 1px solid var(--border); padding: 14px; overflow-y: auto; flex-shrink: 0; }
  .right-panel-title { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; text-align: center; }
  .step-list-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 3px; font-size: 11px; color: var(--text-dim); transition: all 0.3s; }
  .step-list-item.active { background: rgba(0,212,170,0.1); color: var(--accent-cyan); font-weight: 700; }
  .step-list-item.completed { color: var(--accent-green); }
  .step-list-item.completed .step-list-num { background: var(--accent-green); color: #fff; }
  .step-list-num { width: 20px; height: 20px; line-height: 20px; text-align: center; background: var(--bg-card); border-radius: 50%; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .step-list-item.active .step-list-num { background: var(--accent-cyan); color: var(--bg-primary); }
  .end-icon { font-size: 72px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  .end-title { font-size: 32px; font-weight: 900; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .end-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
  .end-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }
  .end-stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 16px; text-align: center; }
  .end-stat-value { font-size: 28px; font-weight: 900; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .end-stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .end-grade { font-size: 64px; font-weight: 900; margin-bottom: 6px; }
  .end-grade-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .end-stars { font-size: 32px; margin-bottom: 24px; letter-spacing: 6px; }
  .btn-restart { padding: 12px 44px; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); color: var(--bg-primary); border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
  .btn-restart:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px rgba(0,212,170,0.4); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 50%{transform:translateX(5px)} 75%{transform:translateX(-5px)} }
  .drag-ghost { position: fixed; pointer-events: none; z-index: 1000; padding: 6px 14px; background: rgba(30,42,69,0.95); border: 2px solid var(--accent-cyan); border-radius: 8px; font-size: 13px; color: var(--accent-cyan); font-weight: 700; box-shadow: 0 8px 30px rgba(0,0,0,0.4); backdrop-filter: blur(10px); transform: translate(-50%,-50%); }
  .end-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 520px; max-width: 95vw; background: linear-gradient(135deg, rgba(26,26,46,0.97), rgba(22,33,62,0.97)); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,212,170,0.1); z-index: 1000; display: none; overflow: hidden; backdrop-filter: blur(16px); }
  .end-popup.show { display: block; animation: popupIn .4s ease; }
  @keyframes popupIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .end-popup-titlebar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: rgba(0,212,170,0.08); border-bottom: 1px solid var(--border); cursor: move; user-select: none; }
  .end-popup-title { font-size: 14px; font-weight: 700; color: var(--accent-cyan); }
  .end-popup-btns { display: flex; gap: 6px; }
  .end-popup-btn { width: 28px; height: 28px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .end-popup-btn:hover { background: rgba(0,212,170,0.15); color: var(--accent-cyan); }
  .end-popup-body { padding: 28px 24px 24px; text-align: center; }
  .end-minimized-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(22,33,62,0.95)); border: 1px solid var(--accent-cyan); border-radius: 10px; color: var(--accent-cyan); font-size: 13px; font-weight: 600; cursor: pointer; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: fadeIn .3s ease; }
  .end-minimized-bar:hover { background: rgba(0,212,170,0.15); }
  #gameScreen.behind-popup { display: flex !important; pointer-events: auto; }
  .end-content { text-align: center; }
</style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="start-bg-grid"></div>
  <div class="start-content">
    <div class="start-icon">🛰️</div>
    <div class="start-title">GNSS自动化监测系统</div>
    <div class="start-subtitle">1基准站 + 1监测站 · 安装实训（现场实操版）</div>
    <canvas id="startDiagramCanvas" width="680" height="320"></canvas>
    <div class="start-steps" id="startStepsList"></div>
    <button class="btn-start" onclick="startGame()">开 始 安 装</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="top-bar">
    <div class="top-bar-left"><div class="top-bar-title">🛰️ GNSS监测安装</div></div>
    <div class="top-bar-center">
      <div class="stat-item"><span class="stat-icon">⭐</span><span class="stat-value" id="scoreDisplay">0</span><span class="stat-label">分</span></div>
      <div class="stat-item"><span class="stat-icon">⏱️</span><span class="stat-value" id="timerDisplay">00:00</span></div>
      <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
      <span class="progress-text" id="progressText">0/11</span>
    </div>
    <div class="top-bar-right"><button class="btn-hint" id="hintBtn" onclick="showHint()">💡 提示</button></div>
  </div>
  <div class="game-body">
    <div class="toolbar" id="toolbar"><div class="toolbar-title">工具 / 部件</div></div>
    <div class="canvas-area" id="canvasArea">
      <canvas id="gameCanvas"></canvas>
      <div class="step-info" id="stepInfo"><div class="step-info-title" id="stepInfoTitle"></div><div class="step-info-desc" id="stepInfoDesc"></div></div>
      <div class="hint-panel" id="hintPanel"><div class="hint-panel-title">💡 操作提示</div><div id="hintText"></div></div>
      <div class="feedback-overlay" id="feedbackOverlay"></div>
    </div>
    <div class="right-panel"><div class="right-panel-title">安装步骤</div><div id="stepList"></div></div>
  </div>
</div>

<div id="endScreen" class="end-popup">
  <div class="end-popup-titlebar">
    <span class="end-popup-title">🏆 安装完成 — 评分结果</span>
    <div class="end-popup-btns">
      <button class="end-popup-btn" onclick="minimizeEndScreen()" title="最小化">─</button>
      <button class="end-popup-btn" onclick="closeEndScreen()" title="关闭并重新开始">✕</button>
    </div>
  </div>
  <div class="end-popup-body">
    <div class="end-icon">🎉</div>
    <div class="end-title">安装完成!</div>
    <div class="end-subtitle">GNSS自动化监测系统已成功安装</div>
    <div class="end-stars" id="endStars"></div>
    <div class="end-grade" id="endGrade"></div>
    <div class="end-grade-label">综合评级</div>
    <div class="end-stats">
      <div class="end-stat-card"><div class="end-stat-value" id="endScore">0</div><div class="end-stat-label">总得分</div></div>
      <div class="end-stat-card"><div class="end-stat-value" id="endTime">00:00</div><div class="end-stat-label">总用时</div></div>
      <div class="end-stat-card"><div class="end-stat-value" id="endAccuracy">0%</div><div class="end-stat-label">操作准确率</div></div>
    </div>
    <button class="btn-restart" onclick="restartGame()">再 来 一 次</button>
  </div>
</div>
<div id="endScreenMinimized" class="end-minimized-bar" onclick="restoreEndScreen()" style="display:none;">🏆 安装完成 — 点击查看评分</div>

<script>
const STEPS = [
  { id:1, title:'前期选址规划', desc:'确定基准站和监测站位置。基准站必须永久稳定、远离施工扰动，视野开阔无遮挡。监测点选在需监测的变形区域，与结构刚性固定。', hint:'拖拽「📍 选址标记」到地面2个位置（基准站左、监测站右）。基准站必须远离施工扰动区！', tool:{emoji:'📍',name:'选址标记'}, score:120 },
  { id:2, title:'浇筑/固定基座', desc:'监测点做30×30×40cm混凝土观测墩，内置钢筋，顶面预埋强制对中螺栓。基准站基座更大更稳固，做50×50cm墩。', hint:'拖拽「🧱 混凝土墩」到2个位置。基准站墩体50×50cm，监测站30×30cm！', tool:{emoji:'🧱',name:'混凝土墩'}, score:100 },
  { id:3, title:'安装GNSS天线', desc:'天线盘水平安装，气泡居中。天线正北标记对准真北（用罗盘）。扼流圈朝下，拧紧固定螺栓，严禁松动。', hint:'拖拽「📡 GNSS天线」到2个基座上方。正北标记对准真北！', tool:{emoji:'📡',name:'GNSS天线'}, score:120 },
  { id:4, title:'安装接收机与防护箱', desc:'防水箱固定在观测墩旁，离地≥30cm。箱内安装GNSS主机、4G模块、电源模块、避雷器。天线馈线接入主机，做好接头防水。', hint:'拖拽「🗄️ 防水箱+接收机」到基座旁侧。箱内含主机、4G模块、避雷器！', tool:{emoji:'🗄️',name:'防水箱+接收机'}, score:100 },
  { id:5, title:'供电系统安装', desc:'市电：220V进配电箱，加空开、浪涌保护器。太阳能：太阳能板朝南，倾角45°，接蓄电池、控制器。', hint:'拖拽「⚡ 供电系统」到设备区域。市电配浪涌保护，野外用太阳能+蓄电池！', tool:{emoji:'⚡',name:'供电系统'}, score:120 },
  { id:6, title:'通信与接地系统', desc:'4G天线装在箱外高处。接地用镀锌扁铁打入地下≥1.5m，主机、箱体、支架全部可靠接地，防雷。', hint:'拖拽「📻 4G天线+接地」到箱顶。接地扁铁≥1.5m入地！', tool:{emoji:'📻',name:'4G天线+接地'}, score:100 },
  { id:7, title:'连接天线馈线', desc:'天线馈线从天线盘连接到防水箱内GNSS主机。接头拧紧，缠防水胶带，线路穿PE管保护。', hint:'拖拽「🔗 天线馈线」从天线到防水箱。缠防水胶带，穿PE管！', tool:{emoji:'🔗',name:'天线馈线'}, score:100 },
  { id:8, title:'连接通信与电源线', desc:'按顺序接线：先接天线→再接通信线→再接电源线。所有线路穿PE管保护，做好防水。', hint:'拖拽「🔌 通信电源线」到箱内。接线顺序：天线→通信→电源！', tool:{emoji:'🔌',name:'通信电源线'}, score:100 },
  { id:9, title:'系统调试与配置 ⭐', desc:'后台平台添加设备ID，设置采样频率1Hz，开启北斗+GPS+GLONASS多星固定解模式。测试数据上传。', hint:'拖拽「🖥️ 调试终端」到设备区域。采样频率1Hz，多星固定解！', tool:{emoji:'🖥️',name:'调试终端'}, score:150 },
  { id:10, title:'防护与标识', desc:'线缆全部防水处理，箱体密封，通风防潮。太阳能板防鸟粪灰尘。基准站、监测站编号拍照。', hint:'拖拽「🛡️ 防护标识」覆盖所有设备。线缆防水、箱体密封、编号！', tool:{emoji:'🛡️',name:'防护标识'}, score:100 },

function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath(); }

function showScreen(s){[startScreen,gameScreen].forEach(el=>el.classList.remove('active'));s.classList.add('active');}

function startGame(){
  gameState={currentStep:0,score:0,totalAttempts:0,correctAttempts:0,startTime:Date.now(),timerInterval:null,elapsedSeconds:0,hintsUsed:0,completed:false,dropZoneRect:null};
  groundDots=[]; showScreen(gameScreen); resizeCanvas(); buildToolbar(); buildStepList(); updateUI(); startTimer(); startAnimation();
}
function restartGame(){stopTimer();if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}touchDragStep=null;dragData=null;hintPanel.classList.remove('show');document.getElementById('endScreen').classList.remove('show');document.getElementById('endScreenMinimized').style.display='none';document.getElementById('gameScreen').classList.remove('behind-popup');showScreen(startScreen);}

function startTimer(){clearInterval(gameState.timerInterval);gameState.startTime=Date.now();gameState.timerInterval=setInterval(()=>{gameState.elapsedSeconds=Math.floor((Date.now()-gameState.startTime)/1000);const m=String(Math.floor(gameState.elapsedSeconds/60)).padStart(2,'0');const s=String(gameState.elapsedSeconds%60).padStart(2,'0');timerDisplay.textContent=`${m}:${s}`;},500);}
function stopTimer(){clearInterval(gameState.timerInterval);}

function resizeCanvas(){const a=canvasArea;canvas.width=Math.max(680,a.clientWidth-40);canvas.height=Math.max(480,a.clientHeight-120);canvas.style.width=canvas.width+'px';canvas.style.height=canvas.height+'px';groundDots=[];}
window.addEventListener('resize',()=>{if(gameScreen.classList.contains('active')&&!gameState.completed){resizeCanvas();drawScene();}});

function buildToolbar(){toolbar.querySelectorAll('.tool-item').forEach(i=>i.remove());STEPS.forEach((step,idx)=>{const d=document.createElement('div');d.className='tool-item';d.dataset.stepIndex=idx;if(idx<gameState.currentStep)d.classList.add('used');d.innerHTML=`<span class="tool-emoji">${step.tool.emoji}</span><span class="tool-name">${step.tool.name}</span>`;d.setAttribute('draggable',idx===gameState.currentStep?'true':'false');if(idx!==gameState.currentStep)d.style.opacity=idx<gameState.currentStep?'0.3':'0.5';d.addEventListener('dragstart',onDragStart);d.addEventListener('dragend',onDragEnd);toolbar.appendChild(d);});}
function buildStepList(){stepList.innerHTML='';STEPS.forEach((step,idx)=>{const d=document.createElement('div');d.className='step-list-item';if(idx<gameState.currentStep)d.classList.add('completed');if(idx===gameState.currentStep)d.classList.add('active');d.innerHTML=`<span class="step-list-num">${idx+1}</span><span>${step.title}</span>`;stepList.appendChild(d);});}
function updateUI(){const step=STEPS[gameState.currentStep];scoreDisplay.textContent=gameState.score;const c=gameState.currentStep,t=STEPS.length;progressBar.style.width=(c/t*100)+'%';progressText.textContent=`${c}/${t}`;if(step){stepInfoTitle.textContent=`步骤 ${step.id}：${step.title}`;stepInfoDesc.textContent=step.desc;}else if(gameState.completed){stepInfoTitle.textContent='安装完成！';stepInfoDesc.textContent='GNSS自动化监测系统已成功安装，查看评分结果。';}hintBtn.disabled=gameState.completed;hintPanel.classList.remove('show');}
function showHint(){if(gameState.completed)return;const s=STEPS[gameState.currentStep];if(!s)return;gameState.hintsUsed++;hintText.textContent=s.hint;hintPanel.classList.add('show');setTimeout(()=>hintPanel.classList.remove('show'),6000);}
function showFeedback(ok){feedbackOverlay.className='feedback-overlay '+(ok?'correct':'wrong');feedbackOverlay.textContent=ok?'✓ 操作正确！':'✗ 操作错误，请重试';feedbackOverlay.classList.add('show');setTimeout(()=>feedbackOverlay.classList.remove('show'),1200);}

// DRAG & DROP
function onDragStart(e){const idx=parseInt(e.currentTarget.dataset.stepIndex);if(idx!==gameState.currentStep){e.preventDefault();return;}dragData={stepIndex:idx};e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',idx.toString());const step=STEPS[idx];const ghost=document.createElement('div');ghost.className='drag-ghost';ghost.textContent=step.tool.emoji+' '+step.tool.name;ghost.style.top='-9999px';ghost.style.left='-9999px';document.body.appendChild(ghost);requestAnimationFrame(()=>requestAnimationFrame(()=>ghost.remove()));e.dataTransfer.setDragImage(ghost,ghost.offsetWidth/2,ghost.offsetHeight/2);}
function onDragEnd(e){dragData=null;}
canvas.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
canvas.addEventListener('dragleave',()=>{canvas.style.cursor='default';});
canvas.addEventListener('drop',e=>{e.preventDefault();canvas.style.cursor='default';if(!dragData&&dragData!==0)return;const idx=dragData.stepIndex;if(idx!==gameState.currentStep)return;const rect=canvas.getBoundingClientRect();const sx=canvas.width/rect.width,sy=canvas.height/rect.height;const x=(e.clientX-rect.left)*sx,y=(e.clientY-rect.top)*sy;const zone=getDropZone();if(!zone)return;const inZone=x>=zone.x&&x<=zone.x+zone.w&&y>=zone.y&&y<=zone.y+zone.h;gameState.totalAttempts++;if(inZone){gameState.correctAttempts++;const step=STEPS[gameState.currentStep];const penalty=Math.min(gameState.hintsUsed*10,30);gameState.score+=Math.max(step.score-penalty,50);gameState.hintsUsed=0;showFeedback(true);flashTool(gameState.currentStep,'correct-flash');gameState.currentStep++;if(gameState.currentStep>=STEPS.length){gameState.completed=true;stopTimer();buildToolbar();buildStepList();updateUI();drawScene();setTimeout(showEndScreen,1500);}else{buildToolbar();buildStepList();updateUI();drawScene();}}else{showFeedback(false);flashTool(gameState.currentStep,'wrong-flash');gameState.score=Math.max(0,gameState.score-20);updateUI();}dragData=null;});
function flashTool(si,cls){toolbar.querySelectorAll('.tool-item').forEach(item=>{if(parseInt(item.dataset.stepIndex)===si){item.classList.add(cls);setTimeout(()=>item.classList.remove(cls),600);}});}

// TOUCH
toolbar.addEventListener('touchstart',e=>{const ti=e.target.closest('.tool-item');if(!ti)return;const idx=parseInt(ti.dataset.stepIndex);if(idx!==gameState.currentStep)return;touchDragStep=idx;e.preventDefault();const step=STEPS[idx];touchGhost=document.createElement('div');touchGhost.className='drag-ghost';touchGhost.textContent=step.tool.emoji+' '+step.tool.name;document.body.appendChild(touchGhost);const t=e.touches[0];touchGhost.style.left=t.clientX+'px';touchGhost.style.top=t.clientY+'px';},{passive:false});
toolbar.addEventListener('touchmove',e=>{if(touchDragStep===null)return;e.preventDefault();if(touchGhost){const t=e.touches[0];touchGhost.style.left=t.clientX+'px';touchGhost.style.top=t.clientY+'px';}},{passive:false});
toolbar.addEventListener('touchend',e=>{if(touchDragStep===null)return;const t=e.changedTouches[0];const rect=canvas.getBoundingClientRect();const sx=canvas.width/rect.width,sy=canvas.height/rect.height;const x=(t.clientX-rect.left)*sx,y=(t.clientY-rect.top)*sy;const zone=getDropZone();if(!zone){touchDragStep=null;return;}const inZone=x>=zone.x&&x<=zone.x+zone.w&&y>=zone.y&&y<=zone.y+zone.h;gameState.totalAttempts++;if(inZone){gameState.correctAttempts++;const step=STEPS[gameState.currentStep];const penalty=Math.min(gameState.hintsUsed*10,30);gameState.score+=Math.max(step.score-penalty,50);gameState.hintsUsed=0;showFeedback(true);flashTool(gameState.currentStep,'correct-flash');gameState.currentStep++;if(gameState.currentStep>=STEPS.length){gameState.completed=true;stopTimer();buildToolbar();buildStepList();updateUI();drawScene();setTimeout(showEndScreen,1500);}else{buildToolbar();buildStepList();updateUI();drawScene();}}else{showFeedback(false);flashTool(gameState.currentStep,'wrong-flash');gameState.score=Math.max(0,gameState.score-20);updateUI();}touchDragStep=null;if(touchGhost){touchGhost.remove();touchGhost=null;}});
toolbar.addEventListener('touchcancel',()=>{touchDragStep=null;if(touchGhost){touchGhost.remove();touchGhost=null;}});

function getDropZone(){const cw=canvas.width,ch=canvas.height,s=gameState.currentStep;if(s>=STEPS.length)return null;const cx=cw/2,by=ch*0.75;switch(s){
  case 0:return{x:cx-320,y:by-80,w:640,h:100};
  case 1:return{x:cx-320,y:by-80,w:640,h:100};
  case 2:return{x:cx-320,y:by-230,w:640,h:170};
  case 3:return{x:cx-320,y:by-160,w:640,h:120};
  case 4:return{x:cx+80,y:by-260,w:300,h:200};
  case 5:return{x:cx-320,y:by-280,w:640,h:120};
  case 6:return{x:cx-320,y:by-220,w:640,h:100};
  case 7:return{x:cx-320,y:by-160,w:640,h:120};
  case 8:return{x:cx-180,y:by-260,w:360,h:220};
  case 9:return{x:cx-320,y:by-280,w:640,h:320};
  case 10:return{x:cx-320,y:by-280,w:640,h:320};
  default:return null;
}}

function drawScene(){const cw=canvas.width,ch=canvas.height;ctx.clearRect(0,0,cw,ch);const cx=cw/2,by=ch*0.75,c=gameState.currentStep;
  drawBG(cw,ch); drawGround(cw,ch,by); drawSatellites(cx,ch);
  if(c>0) drawMarkers(cx,by);
  if(c>1) drawBases(cx,by);
  if(c>2) drawAntennas(cx,by);
  if(c>3) drawBoxes(cx,by);
  if(c>4) drawPower(cx,by);
  if(c>5) drawCommGround(cx,by);
  if(c>6) drawAntCables(cx,by);
  if(c>7) drawCommPowerLines(cx,by);
  if(c>8) drawDebug(cx,by);
  if(c>9) drawProtection(cx,by);
  if(c>10) drawAccept(cx,by);
  if(!gameState.completed) drawDropZone();
  if(!gameState.completed) drawStepInd(cw,ch);
}

function drawBG(cw,ch){const g=ctx.createLinearGradient(0,0,0,ch);g.addColorStop(0,'#0a0f2e');g.addColorStop(0.4,'#0f1b3d');g.addColorStop(1,'#16213e');ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);ctx.strokeStyle='rgba(0,212,170,0.03)';ctx.lineWidth=1;for(let x=0;x<cw;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ch);ctx.stroke();}for(let y=0;y<ch;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cw,y);ctx.stroke();}}

function drawGround(cw,ch,by){const g=ctx.createLinearGradient(0,by,0,ch);g.addColorStop(0,'#2d3a2e');g.addColorStop(1,'#1a261a');ctx.fillStyle=g;ctx.fillRect(0,by,cw,ch-by);ctx.strokeStyle='#4a7c4a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,by);ctx.lineTo(cw,by);ctx.stroke();if(groundDots.length===0){for(let i=0;i<35;i++)groundDots.push({x:Math.random()*cw,y:by+10+Math.random()*(ch-by-20),r:1+Math.random()*2});}ctx.fillStyle='rgba(74,124,74,0.3)';groundDots.forEach(d=>{ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();});}

function drawSatellites(cx,ch){const t=Date.now()/1000;[{x:cx-150,y:45},{x:cx,y:30},{x:cx+150,y:50}].forEach((s,i)=>{ctx.save();const y=s.y+Math.sin(t*0.5+i)*5;ctx.fillStyle='rgba(0,212,170,0.7)';ctx.beginPath();ctx.moveTo(s.x,y-10);ctx.lineTo(s.x-7,y+7);ctx.lineTo(s.x+7,y+7);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(0,212,170,0.2)';ctx.beginPath();ctx.arc(s.x,y,14,0,Math.PI*2);ctx.fill();ctx.restore();});}

function drawMarkers(cx,by){[{x:cx-200,label:'基准站',color:'#00d4aa'},{x:cx+200,label:'监测站',color:'#0ea5e9'}].forEach(p=>{ctx.save();ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,by-10,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillRect(p.x-1.5,by-10,3,10);const t=Date.now()/1000;ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,by-10,10+Math.sin(t+p.x)*3,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 11px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(p.label,p.x,by-22);ctx.restore();});}

function drawBases(cx,by){const stations=[{x:cx-200,bw:90,bh:55,label:'基准站 50×50',color:'#00d4aa'},{x:cx+200,bw:65,bh:40,label:'监测站 30×30',color:'#0ea5e9'}];
stations.forEach(s=>{ctx.save();const bx=s.x-s.bw/2,bby=by-s.bh;
// shadow
ctx.fillStyle='rgba(0,0,0,0.3)';rr(ctx,bx+3,bby+3,s.bw,s.bh,4);ctx.fill();
// trapezoid base
const g=ctx.createLinearGradient(bx,bby,bx,bby+s.bh);g.addColorStop(0,'#6b7280');g.addColorStop(1,'#4b5563');
ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(bx+8,bby);ctx.lineTo(bx+s.bw-8,bby);ctx.lineTo(bx+s.bw,bby+s.bh);ctx.lineTo(bx,bby+s.bh);ctx.closePath();ctx.fill();
ctx.strokeStyle=s.color;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+8,bby);ctx.lineTo(bx+s.bw-8,bby);ctx.lineTo(bx+s.bw,bby+s.bh);ctx.lineTo(bx,bby+s.bh);ctx.closePath();ctx.stroke();
// rebar lines
ctx.strokeStyle='rgba(156,163,175,0.4)';ctx.lineWidth=1;
for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(bx+15+i*(s.bw-30)/2,bby+5);ctx.lineTo(bx+10+i*(s.bw-20)/2,bby+s.bh-5);ctx.stroke();}
// forced centering bolt
ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,bby,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(s.x-3,bby);ctx.lineTo(s.x+3,bby);ctx.stroke();ctx.beginPath();ctx.moveTo(s.x,bby-3);ctx.lineTo(s.x,bby+3);ctx.stroke();
// label
ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='9px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(s.label,s.x,by+16);ctx.restore();});}

function drawAntennas(cx,by){
const stations=[{x:cx-200,bh:55,label:'基准站',color:'#00d4aa'},{x:cx+200,bh:40,label:'监测站',color:'#0ea5e9'}];
stations.forEach(s=>{ctx.save();const poleTop=by-s.bh-65;const poleBot=by-s.bh;
// pole
ctx.fillStyle='#9ca3af';ctx.fillRect(s.x-2.5,poleTop,5,poleBot-poleTop);
// choke ring (torus at base of antenna)
ctx.fillStyle='#6b7280';ctx.beginPath();ctx.ellipse(s.x,poleTop+12,18,5,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#9ca3af';ctx.lineWidth=1;ctx.stroke();
// antenna dish (ellipse)
const dg=ctx.createRadialGradient(s.x,poleTop-5,2,s.x,poleTop-5,25);dg.addColorStop(0,'#f3f4f6');dg.addColorStop(0.7,'#d1d5db');dg.addColorStop(1,'#9ca3af');
ctx.fillStyle=dg;ctx.beginPath();ctx.ellipse(s.x,poleTop,25,10,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#6b7280';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(s.x,poleTop,25,10,0,0,Math.PI*2);ctx.stroke();
// north arrow
ctx.fillStyle='#ef4444';ctx.beginPath();ctx.moveTo(s.x,poleTop-12);ctx.lineTo(s.x-4,poleTop-6);ctx.lineTo(s.x+4,poleTop-6);ctx.closePath();ctx.fill();ctx.fillStyle='#ef4444';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText('N',s.x,poleTop-14);
// bubble level
ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(s.x+15,poleTop+3,5,0,Math.PI*2);ctx.fill();ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x+15,poleTop+3,1.5,0,Math.PI*2);ctx.fill();
// signal to sky
ctx.strokeStyle='rgba(0,212,170,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(s.x,poleTop-15);ctx.lineTo(s.x,poleTop-60);ctx.stroke();ctx.setLineDash([]);
// label
ctx.fillStyle=s.color;ctx.font='bold 10px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('GNSS天线',s.x,poleTop-18);
ctx.restore();});}

function drawBoxes(cx,by){
const stations=[{x:cx-200,bh:55,label:'基准站',color:'#00d4aa',side:-1},{x:cx+200,bh:40,label:'监测站',color:'#0ea5e9',side:1}];
stations.forEach(s=>{ctx.save();const bx=s.x+s.side*70,byy=by-s.bh-35,bw=50,bh=45;
ctx.fillStyle='rgba(0,0,0,0.25)';rr(ctx,bx+2,byy+2,bw,bh,4);ctx.fill();
const bg=ctx.createLinearGradient(bx,byy,bx+bw,byy+bh);bg.addColorStop(0,'#1e3a5f');bg.addColorStop(1,'#0f2440');ctx.fillStyle=bg;rr(ctx,bx,byy,bw,bh,4);ctx.fill();ctx.strokeStyle=s.color;ctx.lineWidth=1.5;rr(ctx,bx,byy,bw,bh,4);ctx.stroke();
// mounting bracket
ctx.fillStyle='#6b7280';ctx.fillRect(Math.min(s.x,bx+ bw/2)-3,byy+bh-5,Math.abs(bx+bw/2-s.x)+6,4);
// IP65 badge
ctx.fillStyle='rgba(14,165,233,0.2)';rr(ctx,bx+3,byy+2,28,10,2);ctx.fill();ctx.fillStyle='#0ea5e9';ctx.font='bold 7px sans-serif';ctx.textAlign='left';ctx.fillText('IP65',bx+5,byy+10);
// LEDs
const t=Date.now()/1000;
ctx.fillStyle=Math.sin(t*2)>0?'#22c55e':'#1a4a2e';ctx.shadowColor=Math.sin(t*2)>0?'#22c55e':'transparent';ctx.shadowBlur=Math.sin(t*2)>0?5:0;ctx.beginPath();ctx.arc(bx+10,byy+bh-10,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(bx+22,byy+bh-10,3,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0ea5e9';ctx.beginPath();ctx.arc(bx+34,byy+bh-10,3,0,Math.PI*2);ctx.fill();
// label
ctx.fillStyle=s.color;ctx.font='bold 9px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('防水箱',bx+bw/2,byy+bh+14);ctx.restore();});}

function drawPower(cx,by){
const stations=[{x:cx-200,bh:55,side:-1},{x:cx+200,bh:40,side:1}];
stations.forEach(s=>{ctx.save();const px=s.x+s.side*110,py=by-s.bh-70;
// solar panel
ctx.fillStyle='rgba(0,0,0,0.2)';rr(ctx,px+2,py+2,50,30,3);ctx.fill();
const sg=ctx.createLinearGradient(px,py,px+50,py+30);sg.addColorStop(0,'#1e3a6e');sg.addColorStop(1,'#1a2950');ctx.fillStyle=sg;rr(ctx,px,py,50,30,3);ctx.fill();ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;rr(ctx,px,py,50,30,3);ctx.stroke();
// grid lines
ctx.strokeStyle='rgba(96,165,250,0.4)';ctx.lineWidth=0.5;for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(px+i*12.5,py);ctx.lineTo(px+i*12.5,py+30);ctx.stroke();}ctx.beginPath();ctx.moveTo(px,py+15);ctx.lineTo(px+50,py+15);ctx.stroke();
// bracket (45 deg)
ctx.fillStyle='#6b7280';ctx.save();ctx.translate(px+25,py+30);ctx.rotate(-Math.PI/6);ctx.fillRect(-2,0,4,25);ctx.restore();
// battery
ctx.fillStyle='#374151';rr(ctx,px+10,py+55,30,18,3);ctx.fill();ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;rr(ctx,px+10,py+55,30,18,3);ctx.stroke();
ctx.fillStyle='#f59e0b';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText('BAT',px+25,py+68);
// power line
ctx.strokeStyle='rgba(245,158,11,0.5)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(px+25,py+55);ctx.lineTo(s.x+s.side*70+25,by-s.bh-35+22);ctx.stroke();ctx.setLineDash([]);
// label
ctx.fillStyle='rgba(250,204,21,0.8)';ctx.font='bold 9px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('太阳能板',px+25,py+85);
ctx.restore();});}

function drawCommGround(cx,by){
const stations=[{x:cx-200,bh:55,color:'#00d4aa',side:-1},{x:cx+200,bh:40,color:'#0ea5e9',side:1}];
stations.forEach(s=>{ctx.save();
// 4G antenna on box top
const ax=s.x+s.side*70+25,ay=by-s.bh-65;
ctx.fillStyle='#e5e7eb';ctx.fillRect(ax-1.5,ay,3,20);ctx.fillStyle='#f9fafb';ctx.beginPath();ctx.moveTo(ax,ay-6);ctx.lineTo(ax-5,ay+2);ctx.lineTo(ax+5,ay+2);ctx.closePath();ctx.fill();ctx.strokeStyle=s.color;ctx.lineWidth=1;ctx.stroke();
// signal waves
const t=Date.now()/1000;for(let i=0;i<2;i++){ctx.strokeStyle=`rgba(14,165,233,${0.3-i*0.15})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(ax,ay-3,8+i*6,Math.PI*1.2,Math.PI*1.8);ctx.stroke();}
// grounding rod
const gx=s.x+s.side*90;ctx.fillStyle='#9ca3af';ctx.fillRect(gx-2,by-5,4,20);ctx.strokeStyle='#9ca3af';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(gx-8,by+15);ctx.lineTo(gx+8,by+15);ctx.stroke();
// ground wire from box
ctx.strokeStyle='rgba(245,158,11,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([2,3]);ctx.beginPath();ctx.moveTo(s.x+s.side*70+25,by-s.bh-35+45);ctx.lineTo(gx,by-5);ctx.stroke();ctx.setLineDash([]);
ctx.restore();});}

function drawAntCables(cx,by){
const stations=[{x:cx-200,bh:55,color:'#00d4aa',side:-1},{x:cx+200,bh:40,color:'#0ea5e9',side:1}];
stations.forEach(s=>{ctx.save();
const ax=s.x,ay=by-s.bh-50;const bx=s.x+s.side*70+25,byy=by-s.bh-35;
ctx.strokeStyle='#f59e0b';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,byy);ctx.stroke();
ctx.strokeStyle='rgba(245,158,11,0.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,byy);ctx.stroke();
// PE tube
ctx.strokeStyle='rgba(156,163,175,0.3)';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,byy);ctx.stroke();
// connectors
ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(ax,ay,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bx,byy,4,0,Math.PI*2);ctx.fill();
// label
ctx.fillStyle='rgba(245,158,11,0.7)';ctx.font='8px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('PE管+馈线',(ax+bx)/2,(ay+byy)/2-8);
ctx.restore();});}

function drawCommPowerLines(cx,by){
const stations=[{x:cx-200,bh:55,color:'#00d4aa',side:-1},{x:cx+200,bh:40,color:'#0ea5e9',side:1}];
// 4G comm line between stations
ctx.save();ctx.strokeStyle='#0ea5e9';ctx.lineWidth=2;ctx.setLineDash([6,3]);ctx.beginPath();ctx.moveTo(cx-200-70+25,by-40);ctx.lineTo(cx+200+70-25,by-40);ctx.stroke();ctx.setLineDash([]);
// data flow animation
const t=Date.now()/1000;const fx=cx-70+((t*60)%140);ctx.fillStyle='rgba(14,165,233,0.6)';ctx.beginPath();ctx.arc(fx,by-40,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='rgba(14,165,233,0.5)';ctx.font='9px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('4G 数据传输',cx,by-48);
// power cable from solar to box
stations.forEach(s=>{ctx.strokeStyle='rgba(34,197,94,0.4)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(s.x+s.side*110+25,by-s.bh-15);ctx.lineTo(s.x+s.side*70+25,by-s.bh-25);ctx.stroke();ctx.setLineDash([]);});
ctx.restore();}

function drawDebug(cx,by){
ctx.save();const t=Date.now()/1000;
// terminal screen floating above center
const tx=cx-80,ty=by-300,tw=160,th=100;
ctx.fillStyle='rgba(0,0,0,0.5)';rr(ctx,tx+3,ty+3,tw,th,6);ctx.fill();
ctx.fillStyle='#0a0f1e';rr(ctx,tx,ty,tw,th,6);ctx.fill();ctx.strokeStyle='#00d4aa';ctx.lineWidth=1;rr(ctx,tx,ty,tw,th,6);ctx.stroke();
// terminal header
ctx.fillStyle='rgba(0,212,170,0.15)';rr(ctx,tx,ty,tw,18,6);ctx.fill();ctx.fillStyle='#00d4aa';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('GNSS Monitor v2.0',tx+8,ty+13);
// data lines
const lines=['FIX: 12.345678 N  108.123456 E','FIX: 12.345682 N  108.123459 E','FIX: 12.345679 N  108.123457 E','SAT: GPS×8 + BDS×7 + GLO×6','RATE: 1Hz | MODE: RTK Fixed'];
ctx.font='8px monospace';ctx.textAlign='left';
lines.forEach((l,i)=>{ctx.fillStyle=i===0?'#22c55e':'rgba(0,212,170,0.7)';ctx.fillText(l,tx+8,ty+30+i*13);});
// cursor blink
if(Math.sin(t*3)>0){ctx.fillStyle='#00d4aa';ctx.fillRect(tx+8,ty+30+lines.length*13-5,6,8);}
// connection lines to stations
ctx.strokeStyle='rgba(0,212,170,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
ctx.beginPath();ctx.moveTo(tx+tw/2,ty+th);ctx.lineTo(cx-200,by-140);ctx.stroke();
ctx.beginPath();ctx.moveTo(tx+tw/2,ty+th);ctx.lineTo(cx+200,by-120);ctx.stroke();
ctx.setLineDash([]);
ctx.restore();}

function drawProtection(cx,by){
const stations=[{x:cx-200,bh:55,label:'基准站',color:'#00d4aa',side:-1},{x:cx+200,bh:40,label:'监测站',color:'#0ea5e9',side:1}];
stations.forEach(s=>{ctx.save();
const pw=120,ph=170,top=by-s.bh-80,bottom=by+5;
ctx.fillStyle='rgba(0,212,170,0.03)';ctx.strokeStyle='rgba(0,212,170,0.35)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
ctx.beginPath();ctx.moveTo(s.x-pw/2,bottom);ctx.lineTo(s.x-pw/2,top+40);ctx.quadraticCurveTo(s.x-10,top-5,s.x,top-5);ctx.quadraticCurveTo(s.x+10,top-5,s.x+pw/2,top+40);ctx.lineTo(s.x+pw/2,bottom);ctx.closePath();ctx.fill();ctx.stroke();ctx.setLineDash([]);
// warning stripes
ctx.strokeStyle='rgba(245,158,11,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.strokeRect(s.x-pw/2+3,top+3,pw-6,bottom-top-6);ctx.setLineDash([]);
// ID tag
ctx.fillStyle='rgba(0,212,170,0.8)';rr(ctx,s.x-25,bottom+4,50,16,3);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 8px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(s.label+' #'+(s.side<0?'01':'02'),s.x,bottom+16);
ctx.restore();});
ctx.save();ctx.fillStyle='rgba(0,212,170,0.5)';ctx.font='10px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('防水 · 防尘 · 通风防潮',cx,by+24);ctx.restore();}

function drawAccept(cx,by){
ctx.save();const t=Date.now()/1000;
// checkmark badge on each station
[{x:cx-200,bh:55},{x:cx+200,bh:40}].forEach(s=>{
ctx.fillStyle='rgba(34,197,94,0.15)';ctx.beginPath();ctx.arc(s.x,by-s.bh-100,18,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,by-s.bh-100,18,0,Math.PI*2);ctx.stroke();
ctx.fillStyle='#22c55e';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('✓',s.x,by-s.bh-95);
// glow
ctx.shadowColor='#22c55e';ctx.shadowBlur=Math.sin(t*2)*5+5;ctx.beginPath();ctx.arc(s.x,by-s.bh-100,18,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
});
// banner
ctx.fillStyle='rgba(34,197,94,0.12)';rr(ctx,cx-120,by-330,240,28,8);ctx.fill();ctx.strokeStyle='rgba(34,197,94,0.4)';ctx.lineWidth=1;rr(ctx,cx-120,by-330,240,28,8);ctx.stroke();
ctx.fillStyle='#22c55e';ctx.font='bold 13px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('✅ 连续观测24h验收合格',cx,by-311);
ctx.restore();}

function drawDropZone(){const zone=getDropZone();if(!zone)return;ctx.save();const t=Date.now()/1000;ctx.strokeStyle='rgba(0,212,170,0.6)';ctx.lineWidth=2;ctx.setLineDash([8,4]);ctx.lineDashOffset=-t*30;rr(ctx,zone.x,zone.y,zone.w,zone.h,8);ctx.stroke();ctx.fillStyle='rgba(0,212,170,0.05)';rr(ctx,zone.x,zone.y,zone.w,zone.h,8);ctx.fill();ctx.setLineDash([]);ctx.fillStyle='rgba(0,212,170,0.7)';ctx.font='11px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('放置此处',zone.x+zone.w/2,zone.y+zone.h/2+4);ctx.restore();}

function drawStepInd(cw,ch){const step=STEPS[gameState.currentStep];if(!step)return;ctx.save();ctx.fillStyle='rgba(0,212,170,0.1)';rr(ctx,14,14,210,38,8);ctx.fill();ctx.strokeStyle='rgba(0,212,170,0.3)';ctx.lineWidth=1;rr(ctx,14,14,210,38,8);ctx.stroke();ctx.fillStyle='#00d4aa';ctx.font='bold 12px "Noto Sans SC"';ctx.textAlign='left';ctx.fillText(`${step.tool.emoji} ${step.title}`,26,39);ctx.restore();}

// ANIMATION
function animate(){if(gameScreen.classList.contains('active')&&!gameState.completed){drawScene();}animFrame=requestAnimationFrame(animate);}
function startAnimation(){if(animFrame)cancelAnimationFrame(animFrame);animate();}
function stopAnimation(){if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}}

// END SCREEN
function showEndScreen(){stopAnimation();const accuracy=gameState.totalAttempts>0?Math.round((gameState.correctAttempts/gameState.totalAttempts)*100):100;let stars=5;if(accuracy<90)stars=4;if(accuracy<75)stars=3;if(accuracy<60)stars=2;if(accuracy<40)stars=1;let grade='S',gradeColor='#fbbf24';if(accuracy<90||gameState.elapsedSeconds>300){grade='A';gradeColor='#00d4aa';}if(accuracy<75||gameState.elapsedSeconds>480){grade='B';gradeColor='#0ea5e9';}if(accuracy<60){grade='C';gradeColor='#f59e0b';}if(accuracy<40){grade='D';gradeColor='#ef4444';}document.getElementById('endScore').textContent=gameState.score;const m=String(Math.floor(gameState.elapsedSeconds/60)).padStart(2,'0');const s=String(gameState.elapsedSeconds%60).padStart(2,'0');document.getElementById('endTime').textContent=`${m}:${s}`;document.getElementById('endAccuracy').textContent=accuracy+'%';document.getElementById('endStars').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);const ge=document.getElementById('endGrade');ge.textContent=grade;ge.style.color=gradeColor;document.getElementById('endScreen').classList.add('show');document.getElementById('gameScreen').classList.add('behind-popup');document.getElementById('endScreenMinimized').style.display='none';}

function minimizeEndScreen(){document.getElementById('endScreen').classList.remove('show');document.getElementById('endScreenMinimized').style.display='block';}
function restoreEndScreen(){document.getElementById('endScreen').classList.add('show');document.getElementById('endScreenMinimized').style.display='none';}
function closeEndScreen(){document.getElementById('endScreen').classList.remove('show');document.getElementById('endScreenMinimized').style.display='none';document.getElementById('gameScreen').classList.remove('behind-popup');restartGame();}
</script>
